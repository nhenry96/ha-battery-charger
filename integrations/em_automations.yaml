    action:
      - delay: "00:00:05"
      - service: input_select.select_option
        target:
          entity_id: input_select.inverter_brand
        data:
          option: "{{ states('input_text.saved_inverter_brand') }}"
  - id: "inverter_run_mode_changed"
    alias: "Inverter Run Mode Changed"
    description: "Starts and stops the inverter based on brand"
    trigger:
      - platform: state
        entity_id: input_select.inverter_run_mode
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
                  inverter_start: 0xCF
                  inverter_stop: 0xCE
              - service: modbus.write_register
                data:
                  hub: sungrow_inverter
                  slave: !secret modbus_slave
                  address: 12999
                  value: >
                    {% if is_state('input_select.inverter_run_mode', "Start") %}
                      {{ inverter_start }}
                    {% else %}
                      {{ inverter_stop }}
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: !secret modbus_slave
                  address: 40500
                  value: >
                    {% if is_state('input_select.inverter_run_mode', "Start") %}
                      1
                    {% else %}
                      0
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              # AlphaESS doesn't have direct start/stop This would typically be handled through dispatch mode
              - service: modbus.write_register
                data:
                  hub: alphaess_inverter
                  slave: !secret modbus_slave
                  address: 2176 # Dispatch Start (0880H)
                  value: >
                    {% if is_state('input_select.inverter_run_mode', "Start") %}
                      1
                    {% else %}
                      0
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand').startswith('goodwe') }}"
            sequence:
              - service: modbus.write_register
                data:
                  hub: goodwe_inverter
                  slave: !secret modbus_slave
                  address: 0x056E
                  value: >
                    {% if is_state('input_select.inverter_run_mode', "Start") %}
                      0x01 # Auto mode
                    {% else %}
                      0xff # Stopped
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  slave: !secret modbus_slave
                  address: 40232
                  value: >
                    {% if is_state('input_select.inverter_run_mode', "Start") %}
                      1
                    {% else %}
                      0
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  slave: !secret modbus_slave
                  address: 57345
                  value: >
                    {% if is_state('input_select.inverter_run_mode', "Start") %}
                      3 # Resume
                    {% else %}
                      2 # Shutdown
                    {% endif %}
    mode: single
  - id: "energy_manager_scheduled_update_check"
    alias: "Energy Manager - Scheduled Update Check"
    description: "Check for Energy Manager updates daily at 6 AM"
    trigger:
      - platform: time
        at: "06:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.energy_manager_auto_update_check
        state: "on"
    action:
      - service: shell_command.check_energy_manager_updates
        response_variable: update_check_result
      - delay:
          seconds: 3
      # Create notification based on shell command exit code
      - if:
          - condition: template
            value_template: "{{ update_check_result.returncode == 1 }}"
        then:
          - service: persistent_notification.create
            data:
              title: "✅ Energy Manager Update Available"
              message: "A new version is available for download. Scheduled check found updates at {{ now().strftime('%H:%M') }}."
              notification_id: "em_scheduled_update_result"
        else:
          - if:
              - condition: template
                value_template: "{{ update_check_result.returncode == 2 }}"
            then:
              - service: persistent_notification.create
                data:
                  title: "❌ Energy Manager Scheduled Check Failed"
                  message: "Failed to check for updates during scheduled check at {{ now().strftime('%H:%M') }}."
                  notification_id: "em_scheduled_update_result"
      # Note: No notification for "up to date" on scheduled checks to avoid spam
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.energy_manager_last_update_check
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    mode: single
  - id: "energy_manager_manual_update_check"
    alias: "Energy Manager - Manual Update Check"
    description: "Manual trigger for checking updates"
    trigger:
      - platform: event
        event_type: call_service
        event_data:
          domain: automation
          service: trigger
          service_data:
            entity_id: automation.energy_manager_manual_update_check
    action:
      - service: persistent_notification.create
        data:
          title: "Checking for Updates"
          message: "Checking for Energy Manager updates..."
          notification_id: "em_checking_updates"
      - service: shell_command.check_energy_manager_updates
        response_variable: update_check_result
      - delay:
          seconds: 5
      - service: persistent_notification.dismiss
        data:
          notification_id: "em_checking_updates"
      # Update timestamp
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.energy_manager_last_update_check
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # Create notification based on shell command exit code
      - if:
          - condition: template
            value_template: "{{ update_check_result.returncode == 1 }}"
        then:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.energy_manager_update_available
          # Update available version when updates found
          - service: shell_command.get_available_version
            response_variable: version_result
          - service: input_text.set_value
            target:
              entity_id: input_text.energy_manager_available_version
            data:
              value: "{{ version_result.stdout.split(':')[1] if ':' in version_result.stdout else 'Available' }}"
          # Get changelog directly
          - service: shell_command.get_changelog_direct
            response_variable: changelog_result
          - service: input_text.set_value
            target:
              entity_id: input_text.energy_manager_changelog
            data:
              value: "{{ changelog_result.stdout }}"
          - service: persistent_notification.create
            data:
              title: "✅ Energy Manager Update Available"
              message: "A new version is available for download. Check the dashboard for changelog details."
              notification_id: "em_update_result"
        else:
          - if:
              - condition: template
                value_template: "{{ update_check_result.returncode == 0 }}"
            then:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.energy_manager_update_available
              - service: persistent_notification.create
                data:
                  title: "ℹ️ Energy Manager Up to Date"
                  message: "Energy Manager is running the latest version."
                  notification_id: "em_update_result"
            else:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.energy_manager_update_available
              - service: persistent_notification.create
                data:
                  title: "❌ Energy Manager Update Check Failed"
                  message: "Failed to check for updates. Check the logs for details."
                  notification_id: "em_update_result"
    mode: single
  - id: "energy_manager_perform_update"
    alias: "Energy Manager - Perform Update"
    description: "Perform Energy Manager update when triggered"
    trigger:
      - platform: event
        event_type: call_service
        event_data:
          domain: automation
          service: trigger
          service_data:
            entity_id: automation.energy_manager_perform_update
    condition:
      - condition: state
