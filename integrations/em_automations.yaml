    trigger:
      - platform: state
        entity_id: switch.energy_control_on_off
        from: "on"
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.energy_control_auto_reenable
        state: "on"
    action:
      - service: timer.start
        target:
          entity_id: timer.energy_control
        data:
          duration: "{{ states('input_text.energy_control_duration') }}"
  - id: turn_energy_control_switch_on_when_timer_finishes
    alias: Turn Energy Control Switch On When Timer Finishes
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.energy_control
    condition:
      - condition: state
        entity_id: input_boolean.energy_control_auto_reenable
        state: "on"
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.energy_control_on_off
  - id: goodwe_eh_reset_slots
    alias: "GoodWe EH: Reset all slots when slot selection changes"
