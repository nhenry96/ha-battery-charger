        state: "on"
    action:
      - service: persistent_notification.create
        data:
          title: "Update Starting"
          message: "Energy Manager update is starting. Please do not restart Home Assistant during this process."
          notification_id: "em_update_starting"
      - service: shell_command.perform_energy_manager_update
