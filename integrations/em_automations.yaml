# === ENERGY_MANAGER_AUTOMATIONS_START v0.3.3 ===
automation:
  - id: "solcast_update"
    alias: Solcast update
    description: ""
    triggers:
      - trigger: time
        at: 05:00:00
    conditions: []
    actions:
      - action: solcast_solar.update_forecasts
        data: {}
    mode: single
  - id: "electricity_5_minute_import_cost_export_price"
    alias: "Electricity: 5 Minute Import Cost & Export Price"
    trigger:
      - platform: time_pattern
        minutes: "/1"
        seconds: "02"
    condition:
      - condition: template
        value_template: "{{ (now().minute % 5) == 0 }}"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.electricity_provider
                state:
                  - "LocalVolts"
                  - "Amber Electric"
            sequence:
              - variables:
                  import_total_now: "{{ states('sensor.imported_energy_total')|float(0) }}"
                  import_total_prev: "{{ states('input_number.prev_imported_energy_total')|float(0) }}"
                  import_kwh_5m: >-
                    {% if import_total_prev == 0 %}
                      0
                    {% else %}
                      {% set d = import_total_now - import_total_prev %}
                      {{ d if d > 0 else 0 }}
                    {% endif %}
                  export_total_now: "{{ states('sensor.exported_energy_total')|float(0) }}"
                  export_total_prev: "{{ states('input_number.prev_exported_energy_total')|float(0) }}"
                  export_kwh_5m: >-
                    {% if export_total_prev == 0 %}
                      0
                    {% else %}
                      {% set d = export_total_now - export_total_prev %}
                      {{ d if d > 0 else 0 }}
                    {% endif %}
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_closing_import_price
                data:
                  value: "{{ states('sensor.grid_buy_price')|float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_closing_export_price
                data:
                  value: "{{ states('sensor.grid_sell_price')|float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_import_cost_5_minutes
                data:
                  value: "{{ import_kwh_5m * states('sensor.grid_buy_price')|float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_export_profit_5_minutes
                data:
                  value: "{{ export_kwh_5m * states('sensor.grid_sell_price')|float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_import_energy_5_minutes
                data:
                  value: "{{ import_kwh_5m }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_export_energy_5_minutes
                data:
                  value: "{{ export_kwh_5m }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.prev_imported_energy_total
                data:
                  value: "{{ import_total_now }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.prev_exported_energy_total
                data:
                  value: "{{ export_total_now }}"
          - conditions:
              - condition: state
                entity_id: input_select.electricity_provider
                state: "Flow Power"
            sequence:
              - variables:
                  start_time: "{{ states('input_datetime.flowpower_peak_start_time') }}"
                  end_time: "{{ states('input_datetime.flowpower_peak_end_time') }}"
                  current_time: "{{ now().strftime('%H:%M:%S') }}"
                  is_peak: >-
                    {% set s = today_at(states('input_datetime.flowpower_peak_start_time')) %}
                    {% set e = today_at(states('input_datetime.flowpower_peak_end_time')) %}
                    {% set n = now() %}
                    {{ (s <= n) and (n < e) }}
                  buy_price: "{{ states('input_number.flowpower_buy_price')|float(0) }}"
                  sell_price: >-
                    {{ states('input_number.flowpower_peak_feedin_price')|float(0)
                       if is_peak
                       else states('input_number.flowpower_offpeak_feedin_price')|float(0) }}
                  import_total_now: "{{ states('sensor.imported_energy_total')|float(0) }}"
                  import_total_prev: "{{ states('input_number.prev_imported_energy_total')|float(0) }}"
                  import_kwh_5m: >-
                    {% if import_total_prev == 0 %}
                      0
                    {% else %}
                      {% set d = import_total_now - import_total_prev %}
                      {{ d if d > 0 else 0 }}
                    {% endif %}
                  export_total_now: "{{ states('sensor.exported_energy_total')|float(0) }}"
                  export_total_prev: "{{ states('input_number.prev_exported_energy_total')|float(0) }}"
                  export_kwh_5m: >-
                    {% if export_total_prev == 0 %}
                      0
                    {% else %}
                      {% set d = export_total_now - export_total_prev %}
                      {{ d if d > 0 else 0 }}
                    {% endif %}
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_closing_import_price
                data:
                  value: "{{ buy_price / 100 }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_closing_export_price
                data:
                  value: "{{ sell_price / 100 }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_import_energy_5_minutes
                data:
                  value: "{{ import_kwh_5m }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_export_energy_5_minutes
                data:
                  value: "{{ export_kwh_5m }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_import_cost_5_minutes
                data:
                  value: "{{ import_kwh_5m * (buy_price/100) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.electricity_export_profit_5_minutes
                data:
                  value: "{{ export_kwh_5m * (sell_price/100) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.prev_imported_energy_total
                data:
                  value: "{{ import_total_now }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.prev_exported_energy_total
                data:
                  value: "{{ export_total_now }}"
    mode: single
  - id: "electricity_import_cost_hourly_reset"
    alias: "Electricity: Reset import Cost Hourly"
    trigger:
      - platform: time_pattern
        minutes: 1
        seconds: 5
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.electricity_import_cost_hourly
        data:
          value: 0
    mode: single
  - id: "electricity_export_profit_hourly_reset"
    alias: "Electricity: Reset Export Profit Hourly"
    trigger:
      - platform: time_pattern
        minutes: 1
        seconds: 5
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.electricity_export_profit_hourly
        data:
          value: 0
    mode: single
  - id: "electricity_import_cost_daily_reset"
    alias: "Electricity: Reset import Cost Daily"
    trigger:
      - platform: time
        at: "00:00:05"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.electricity_import_cost_daily
        data:
          value: 0
    mode: single
  - id: "electricity_export_profit_daily_reset"
    alias: "Electricity: Reset Export Profit Daily"
    trigger:
      - platform: time
        at: "00:00:05"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.electricity_export_profit_daily
        data:
          value: 0
    mode: single
  - id: "electricity_import_cost_monthly_reset"
    alias: "Electricity: Reset import Cost Monthly"
    trigger:
      - platform: time
        at: "00:00:30"
    condition:
      - condition: template
        value_template: "{{ now().day == 1 }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.electricity_import_cost_monthly
        data:
          value: 0
    mode: single
  - id: "electricity_export_profit_monthly_reset"
    alias: "Electricity: Reset Export Profit Monthly"
    trigger:
      - platform: time
        at: "00:00:30"
    condition:
      - condition: template
        value_template: "{{ now().day == 1 }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.electricity_export_profit_monthly
        data:
          value: 0
    mode: single
  - id: "create_inverter_mqtt_sensors"
    alias: "Create Inverter MQTT Sensors"
    trigger:
      - platform: homeassistant
        event: start
    action:
      - repeat:
          for_each:
            - topic: "pv_power"
              name: "PV Power"
              unit: "W"
              class: "power"
            - topic: "grid_power"
              name: "Grid Power"
              unit: "W"
              class: "power"
            - topic: "battery_power"
              name: "Battery Power"
              unit: "W"
              class: "power"
            - topic: "load_power"
              name: "Load Power"
              unit: "W"
              class: "power"
            - topic: "import_power"
              name: "Import Power"
              unit: "W"
              class: "power"
            - topic: "export_power"
              name: "Export Power"
              unit: "W"
              class: "power"
            - topic: "battery_charging_power"
              name: "Battery Charging Power"
              unit: "W"
              class: "power"
            - topic: "battery_discharging_power"
              name: "Battery Discharging Power"
              unit: "W"
              class: "power"
            - topic: "battery_level"
              name: "Battery Level"
              unit: "%"
              class: "battery"
            - topic: "battery_capacity"
              name: "Battery Capacity"
              unit: "kWh"
              class: "energy_storage"
            - topic: "battery_soh"
              name: "Battery SOH"
              unit: "%"
              class: null
            - topic: "battery_temperature"
              name: "Battery Temperature"
              unit: "°C"
              class: "temperature"
            - topic: "battery_charge"
              name: "Battery Charge"
              unit: "kWh"
              class: "energy_storage"
            - topic: "daily_battery_charge"
              name: "Daily Battery Charge"
              unit: "kWh"
              class: "energy"
            - topic: "daily_battery_discharge"
              name: "Daily Battery Discharge"
              unit: "kWh"
              class: "energy"
            - topic: "total_battery_charge"
              name: "Total Battery Charge"
              unit: "kWh"
              class: "energy"
            - topic: "total_battery_discharge"
              name: "Total Battery Discharge"
              unit: "kWh"
              class: "energy"
            - topic: "total_generated_energy"
              name: "Total Generated Energy"
              unit: "kWh"
              class: "energy"
            - topic: "model"
              name: "Model"
              unit: null
              class: null
            - topic: "serial"
              name: "Serial"
              unit: null
              class: null
            - topic: "ems_mode_text"
              name: "EMS Mode Text"
              unit: null
              class: null
            - topic: "ems_charge_discharge_command"
              name: "ems Charge Discharge Command"
              unit: null
              class: null
            - topic: "running_state"
              name: "Running State"
              unit: null
              class: null
            - topic: "ems_charge_discharge_text"
              name: "EMS Charge Discharge Text"
              unit: null
              class: null
            - topic: "max_soc"
              name: "Max SOC"
              unit: "%"
              class: "battery"
            - topic: "min_soc"
              name: "Min SOC"
              unit: "%"
              class: "battery"
            - topic: "battery_forced_power"
              name: "Battery Forced Power"
              unit: "W"
              class: "power"
            - topic: "reserved_soc_backup"
              name: "Reserved SOC Backup"
              unit: "%"
              class: "battery"
            - topic: "max_charge_power"
              name: "Max Charge Power"
              unit: "W"
              class: "power"
            - topic: "max_discharge_power"
              name: "Max Discharge Power"
              unit: "W"
              class: "power"
            - topic: "export_power_limit"
              name: "Export Power Limit"
              unit: "W"
              class: "power"
            - topic: "export_power_limit_enabled"
              name: "Export Power Limit Enabled"
              unit: null
              class: null
            - topic: "current_min_soc"
              name: "Current Min SOC"
              unit: "%"
              class: "battery"
            - topic: "current_max_soc"
              name: "Current Max SOC"
              unit: "%"
              class: "battery"
            - topic: "current_charge_discharge_power"
              name: "Current Charge Discharge Power"
              unit: "W"
              class: "power"
            - topic: "current_reserved_soc_backup"
              name: "Current Reserved SOC Backup"
              unit: "%"
              class: "battery"
            - topic: "current_max_charge_power"
              name: "Current Max Charge Power"
              unit: "W"
              class: "power"
            - topic: "current_max_discharge_power"
              name: "Current Max Discharge Power"
              unit: "W"
              class: "power"
            - topic: "current_export_power_limit"
              name: "Current Export Power Limit"
              unit: "W"
              class: "power"
            - topic: "current_export_power_limit_enabled"
              name: "Current Export Power Limit Enabled"
              unit: null
              class: null
          sequence:
            - service: mqtt.publish
              data:
                topic: "homeassistant/sensor/inverter/{{ repeat.item.topic }}/config"
                payload: >
                  {
                    "name": "Inverter {{ repeat.item.name }}",
                    "state_topic": "homeassistant/sensor/inverter/{{ repeat.item.topic }}/state",
                    {% if repeat.item.unit -%}
                    "unit_of_measurement": "{{ repeat.item.unit }}",
                    {%- endif %}
                    {% if repeat.item.class -%}
                    "device_class": "{{ repeat.item.class }}",
                    {%- endif %}
                    "unique_id": "inverter_{{ repeat.item.topic }}"
                  }
                retain: true
  - id: "inverter_brand_changed"
    alias: "Inverter Brand Changed"
    description: "Automatically switch modbus configuration when inverter brand is changed"
    trigger:
      - platform: state
        entity_id: input_select.inverter_brand
    condition:
      - condition: template
        value_template: "{{ trigger.from_state.state != trigger.to_state.state }}"
    action:
      - service: script.switch_inverter_brand
    mode: single
  - id: "validate_safety_limits"
    alias: "Validate Safety Limits"
    description: "Ensure charge/discharge settings do not exceed safety limits"
    trigger:
      - platform: state
        entity_id:
          - input_number.inverter_max_charge_power
          - input_number.inverter_max_discharge_power
    condition:
      - condition: or
        conditions:
          - condition: template
            value_template: >
              {{ states('input_number.inverter_max_charge_power') | float(0) >
                 states('input_number.safety_max_charge_power') | float(10000) }}
          - condition: template
            value_template: >
              {{ states('input_number.inverter_max_discharge_power') | float(0) >
                 states('input_number.safety_max_discharge_power') | float(10000) }}
    action:
      - service: persistent_notification.create
        data:
          title: "Safety Limit Exceeded"
          message: >
            Warning: Charge or discharge power setting exceeds safety limits.
            Please check your settings before applying.
            Current limits:
            Max Charge: {{ states('input_number.safety_max_charge_power') }}W
            Max Discharge: {{ states('input_number.safety_max_discharge_power') }}W
          notification_id: "safety_limit_warning"
    mode: restart
  - id: "check_inverter_connection"
    alias: "Check Inverter Connection"
    description: "Monitor inverter connection and notify if offline"
    trigger:
      - platform: state
        entity_id: sensor.inverter_state
        to: "unavailable"
        for: "00:05:00"
    action:
      - service: persistent_notification.create
        data:
          title: "Inverter Connection Lost"
          message: >
            The {{ states('input_select.inverter_brand') | title }} inverter appears to be offline.
            Please check your network connection and modbus settings.
          notification_id: "inverter_offline"
    mode: restart
  - id: "clear_inverter_connection_notification"
    alias: "Clear Inverter Connection Notification"
    description: "Clear offline notification when inverter comes back online"
    trigger:
      - platform: state
        entity_id: sensor.inverter_state
        from: "unavailable"
    condition:
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown'] }}"
    action:
      - service: persistent_notification.dismiss
        data:
          notification_id: "inverter_offline"
    mode: single
  - id: "publish_inverter_data_to_mqtt"
    alias: "Publish Inverter Data to MQTT"
    description: "Reads modbus data and publishes to MQTT every 10 seconds"
    trigger:
      - platform: time_pattern
        seconds: "/10"
    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: input_select.inverter_brand
            state: "unknown"
    action:
      - service: script.publish_inverter_data
    mode: single
  - id: restart_reminder
    alias: "Restart Reminder"
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      - condition: state
        entity_id: input_boolean.restart_required
        state: "on"
    action:
      - service: persistent_notification.create
        data:
          title: "Restart Required"
          message: >
            Home Assistant restart is required to apply inverter configuration changes.
            Current selected brand: {{ states('input_select.inverter_brand') }}
          notification_id: restart_reminder
  - id: sync_inverter_controls_on_startup
    alias: "Sync Inverter Controls on Startup"
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: input_select.inverter_brand
    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: input_select.inverter_brand
            state:
              - unavailable
              - unknown
      - condition: template
        value_template: "{{ states('input_select.inverter_brand') in ['sungrow', 'sigenergy', 'alphaess', 'goodwe', 'goodwe_et', 'fronius', 'solaredege'] }}"
    action:
      - delay: "00:00:10" # Wait for modbus to initialize
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.inverter_ems_mode
                data:
                  option: >
                    {% set mode = states('sensor.sungrow_ems_mode_text') %}
                    {% if mode in ['Self-Consumption mode', 'Forced Mode', 'External EMS', 'VPP'] %}
                      {{ mode }}
                    {% else %}
                      Self-Consumption mode
                    {% endif %}
              - service: input_select.select_option
                target:
                  entity_id: input_select.inverter_charge_discharge_mode
                data:
                  option: >
                    {% set mode = states('sensor.sungrow_forced_charge_command') %}
                    {% if mode in ['Stop', 'Forced Charge', 'Forced Discharge'] %}
                      {{ mode }}
                    {% else %}
                      Stop
                    {% endif %}
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_min_soc
                data:
                  value: "{{ states('sensor.sungrow_min_soc') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_soc
                data:
                  value: "{{ states('sensor.sungrow_max_soc') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_reserved_soc_backup
                data:
                  value: "{{ states('sensor.sungrow_reserved_soc_backup') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_charge_discharge_power
                data:
                  value: "{{ states('sensor.sungrow_charge_discharge_power') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_charge_power
                data:
                  value: "{{ states('sensor.sungrow_max_charging_power') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_discharge_power
                data:
                  value: "{{ states('sensor.sungrow_max_discharging_power') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_export_power_limit_input
                data:
                  value: "{{ states('sensor.sungrow_export_power_limit') | float(0) }}"
              - service: input_boolean.turn_{{ 'on' if is_state('sensor.sungrow_export_power_limit_enabled_text', 'true') else 'off' }}
                target:
                  entity_id: input_boolean.inverter_export_power_limit_enabled_input
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.inverter_ems_mode
                data:
                  option: "Self-Consumption mode"
              - service: input_select.select_option
                target:
                  entity_id: input_select.inverter_charge_discharge_mode
                data:
                  option: "Stop"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_min_soc
                data:
                  value: "{{ states('sensor.sigenergy_min_soc') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_soc
                data:
                  value: "{{ states('sensor.sigenergy_max_soc') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_reserved_soc_backup
                data:
                  value: "{{ states('sensor.sigenergy_reserved_soc_backup') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_charge_power
                data:
                  value: "{{ states('sensor.sigenergy_max_charging_power') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_discharge_power
                data:
                  value: "{{ states('sensor.sigenergy_max_discharging_power') | float(0) }}"
              # Note: Sigenergy export power limits are handled differently through plant-level controls Individual inverter export limits would need to be implemented via plant registers
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_min_soc
                data:
                  value: "{{ states('sensor.alphaess_ups_reserve_soc') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_soc
                data:
                  value: "{{ states('sensor.alphaess_charge_cut_soc') | float(0) }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.inverter_ems_mode
                data:
                  option: >
                    {% set mode = states('sensor.fronius_ems_mode') %}
                    {% if mode in ['Self-Consumption mode', 'Forced Mode', 'External EMS', 'VPP'] %}
                      {{ mode }}
                    {% else %}
                      Self-Consumption mode
                    {% endif %}
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_reserved_soc_backup
                data:
                  value: "{{ states('sensor.fronius_reserved_soc_backup') | float(0) / 100 }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_charge_power
                data:
                  value: "{{ states('sensor.fronius_max_charging_power') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_max_discharge_power
                data:
                  value: "{{ states('sensor.fronius_max_discharging_power') | float(0) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.inverter_export_power_limit_input
                data:
                  value: "{{ states('sensor.fronius_export_power_limit') | float(0) }}"
              - service: input_number.set_value
                target:
