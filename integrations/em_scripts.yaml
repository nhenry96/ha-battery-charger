      - delay: "00:00:05"
      - service: shell_command.check_config_files
      - delay: "00:00:02"
      - service: input_select.select_option
        data:
          entity_id: input_select.inverter_brand
          option: "fronius"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.restart_required
      - service: persistent_notification.create
        data:
          title: "✅ Manual Fronius Activation Complete"
          message: >
            Fronius configuration has been manually activated.
            ⚠️ MANUAL RESTART REQUIRED
            Go to Settings → System → Restart when ready.
          notification_id: manual_config_change
  manual_activate_solaredge:
    alias: "Manual Activate SolarEdge"
    icon: mdi:solar-power
    sequence:
      - service: persistent_notification.create
        data:
          title: "Starting SolarEdge Activation"
          message: "Activating SolarEdge configuration... Please wait."
          notification_id: manual_activation_progress
      - delay: "00:00:02"
      - service: shell_command.switch_to_solaredge
      - delay: "00:00:05"
      - service: shell_command.check_config_files
      - delay: "00:00:02"
      - service: input_select.select_option
        data:
          entity_id: input_select.inverter_brand
          option: "solaredge"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.restart_required
      - service: persistent_notification.create
        data:
          title: "✅ Manual SolarEdge Activation Complete"
          message: >
            SolarEdge configuration has been manually activated.
            ⚠️ MANUAL RESTART REQUIRED
            Go to Settings → System → Restart when ready.
          notification_id: manual_config_change
  check_config_status:
    alias: "Check Configuration Status"
    icon: mdi:file-check
    sequence:
      - service: shell_command.check_config_files
      - delay: "00:00:03"
      - service: persistent_notification.create
        data:
          title: "📋 Configuration Status Check"
          message: >
            Configuration status checked. See Home Assistant logs for file details.
            📊 Current Status:
            • Brand setting: {{ states('input_select.inverter_brand') }}
            • Restart required: {{ states('input_boolean.restart_required') }}
            • Sungrow active: {{ states('binary_sensor.sungrow_active') }}
            • Sigenergy active: {{ states('binary_sensor.sigenergy_active') }}
            • AlphaESS active: {{ states('binary_sensor.alphaess_active') }}
            • Goodwe active: {{ states('binary_sensor.goodwe_active') }}
            • Goodwe_ET active: {{ states('binary_sensor.goodwe_et_active') }}
            • Fronius active: {{ states('binary_sensor.fronius_active') }}
            • SolarEdge active: {{ states('binary_sensor.solaredge_active') }}
          notification_id: config_check
  notify_restart_needed:
    alias: "Notify Restart Needed"
    icon: mdi:information
    sequence:
      - service: persistent_notification.create
        data:
          title: "🔄 Configuration Updated - Restart Required"
          message: >
            ✅ Configuration files have been successfully updated.
            **Next Steps:**
            1. Go to Settings → System
            2. Click "Restart"
            3. Wait for Home Assistant to come back online
            Current brand: {{ states('input_select.inverter_brand') }}
          notification_id: restart_instructions
  check_for_energy_manager_updates:
    alias: "Check for Energy Manager Updates"
    icon: mdi:update
    sequence:
      - service: automation.trigger
        target:
          entity_id: automation.energy_manager_manual_update_check
  update_energy_manager:
    alias: "Update Energy Manager"
    icon: mdi:download
    sequence:
      - service: persistent_notification.create
        data:
          title: "🔄 Energy Manager Update Starting"
          message: "Starting Energy Manager update process. Do not restart Home Assistant during this process."
          notification_id: "em_updating"
      - service: shell_command.perform_energy_manager_update
        response_variable: update_result
      - delay:
          seconds: 10
      - service: persistent_notification.dismiss
        data:
          notification_id: "em_updating"
      - if:
          - condition: template
            value_template: "{{ update_result.returncode == 0 }}"
        then:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.energy_manager_update_available
          - service: homeassistant.update_entity
            target:
              entity_id: sensor.energy_manager_current_version
          - delay:
              seconds: 2
          - service: persistent_notification.create
            data:
              title: "✅ Energy Manager Update Complete"
              message: "Successfully updated to version {{ states('input_text.energy_manager_available_version') }}. Please restart Home Assistant if required."
              notification_id: "em_update_complete"
        else:
          - service: persistent_notification.create
            data:
              title: "❌ Energy Manager Update Failed"
              message: "Update failed. Check the logs for details."
              notification_id: "em_update_failed"
  update_energy_manager_force:
    alias: "Update Energy Manager Reinstall"
    icon: mdi:download
    sequence:
      - service: persistent_notification.create
        data:
          title: "🔄 Energy Manager Reinstall Starting"
          message: "Starting Energy Manager reinstall process. Do not restart Home Assistant during this process."
          notification_id: "em_updating"
      - service: shell_command.perform_energy_manager_update_force
        response_variable: update_result
      - delay:
          seconds: 10
      - service: persistent_notification.dismiss
        data:
          notification_id: "em_updating"
      - if:
          - condition: template
            value_template: "{{ update_result.returncode == 0 }}"
        then:
          - service: persistent_notification.create
            data:
              title: "✅ Energy Manager Reinstall Complete"
              message: "Successfully reinstalled update. Please restart Home Assistant if required."
              notification_id: "em_update_complete"
        else:
          - service: persistent_notification.create
            data:
              title: "❌ Energy Manager Reinstall Failed"
              message: "Reinstall failed. Check the logs for details."
              notification_id: "em_update_failed"

  # === ENERGY_MANAGER_SCRIPTS_END ===
