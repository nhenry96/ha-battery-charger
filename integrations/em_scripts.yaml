            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_accumulated_charge_energy') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_battery_charge_energy') | float(0) }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {{ states('sensor.total_battery_charge') | float(0) }}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_dcpower_sf') | float(0) %}
              {{ (( states('sensor.fronius_total_charge_energy') | float(0) / 1000) * (10 ** sf)) }}
            {% endif %}
          # SolarEdge does not track total battery charge
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/total_battery_discharge/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_accumulated_discharge_energy') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_accumulated_discharge_energy') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_battery_discharge_energy') | float(0) }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% if states('sensor.goodwe_total_battery_charge') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.goodwe_total_battery_charge') | float(0) }}
              {% elif states('sensor.total_battery_charge') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.total_battery_charge') | float(0) }}
              {% else %}
                0
              {% endif %}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_battery_charge_rate_sf') | float(0) %}
              {{ ((states('sensor.fronius_total_discharge_energy') | float(0) / 1000) * (10 ** sf)) }}
            {% endif %}
          # SolarEdge does not track total battery discharge
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/total_generated_energy/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_total_pv_energy') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_total_pv_energy') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_inverter_total_pv_energy') | float(0) }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% if states('sensor.goodwe_total_pv_generation') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.goodwe_total_pv_generation') | float(0) }}
              {% elif states('sensor.total_pv_generation') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.total_pv_generation') | float(0) }}
              {% else %}
                0
              {% endif %}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_dcpower_sf') | float(0) %}
              {{ ((states('sensor.fronius_total_pv_energy') | float(0) / 1000) * (10 ** sf)) }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_total_pv_energy') | float(0) }}
            {% endif %}
          retain: true
          # Goodwe does not track total generated energy
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/daily_pv_generation/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_daily_pv_energy') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_daily_pv_energy') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_daily_pv_energy') | float(0) }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% if states('sensor.goodwe_today_s_pv_generation') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.goodwe_today_s_pv_generation') | float(0) }}
              {% elif states('sensor.today_s_pv_generation') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.today_s_pv_generation') | float(0) }}
              {% else %}
                0
              {% endif %}
            {% elif brand == 'fronius' %}
              0
            {% endif %}
          # SolarEdge does not support daily pv generation total
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/model/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_device_type') | string }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_device_type_code') | string }}
            {% elif brand == 'alphaess' %}
              Not Supported
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {{ states('sensor.goodwe_device_type') | string }}
            {% elif brand == 'fronius' %}
              {{ states('sensor.sensor.fronius_inverter_model') | string }}
            {% elif brand == 'solaredege' %}
              {{ states('sensor.solaredge_device_model') | string }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/serial/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_inverter_serial') | string }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_inverter_serial') | string }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_inverter_serial') | string }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {{ states('sensor.goodwe_inverter_serial') | string }}
            {% elif brand == 'fronius' %}
              {{ states('sensor.fronius_inverter_serial') | string }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_inverter_serial_number') | string }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/firmware/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_firmware_version') | string }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_firmware_version') | string }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_firmware_version') | string }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {{ states('sensor.goodwe_firmware_version') | string }}
            {% elif brand == 'fronius' %}
              {{ states('sensor.fronius_firmware_version') | string }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_firmware_version') | string }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/ems_mode_text/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_ems_mode_text') | string }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_ems_mode') | string }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_system_mode_text') | string }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% if states('sensor.goodwe_work_mode') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.goodwe_work_mode') | float(0) }}
              {% elif states('sensor.work_mode') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.work_mode') | float(0) }}
              {% else %}
                0
              {% endif %}
            {% elif brand == 'fronius' %}
              {{ states('sensor.fronius_ems_mode') | string }}
            {% endif %}
          # SolarEdge does not support the EMS Mode description
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/ems_charge_discharge_command/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_charge_discharge_command') }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_charge_discharge_power') }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_charge_discharge_command') }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
               Debug: unknown
            {% elif brand == 'fronius' %}
              {{ states('sensor.fronius_ems_mode') }}
            {% elif brand == 'solaredge' %}
              {% set v = states('sensor.solaredge_charge_discharge_command') | int %}
              {% if v == 65535 %}
                self-consumption
              {% else %}
                {{ v }}
              {% endif %}
            {% endif %}
          retain: true
      # Publish Current Control Settings (from input helpers - user adjustable)
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/max_soc/state"
          payload: "{{ states('input_number.inverter_max_soc') | float(100) }}"
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/min_soc/state"
          payload: "{{ states('input_number.inverter_min_soc') | float(10) }}"
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/battery_forced_power/state"
          payload: "{{ states('input_number.inverter_charge_discharge_power') | float(0) }}"
          retain: true
      # Additional control settings
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/reserved_soc_backup/state"
          payload: "{{ states('input_number.inverter_reserved_soc_backup') | float(0) }}"
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/max_charge_power/state"
          payload: "{{ states('input_number.inverter_max_charge_power') | float(0) }}"
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/max_discharge_power/state"
          payload: "{{ states('input_number.inverter_max_discharge_power') | float(0) }}"
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/export_power_limit/state"
          payload: "{{ states('input_number.inverter_export_power_limit_input') | float(0) }}"
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/export_power_limit_enabled/state"
          payload: "{{ 'true' if is_state('input_boolean.inverter_export_power_limit_enabled', 'on') else 'false' }}"
          retain: true
      # Publish actual inverter values for comparison (read-only from modbus)
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_min_soc/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_min_soc') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_min_soc') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_ups_reserve_soc') | float(0) }}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_energy_percent_sf') | float(0) %}
              {{ (states('sensor.fronius_reserved_soc_backup') | float(0) * (10 ** sf)) }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_reserved_soc') | float(0) }}
            {% endif %}
          retain: true
          # Goodwe has no min or max SoC, just a target
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_max_soc/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_max_soc') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_max_soc') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_charge_cut_soc') | float(0) / 10 }}
            {% elif brand == 'fronius' %}
              100
            {% elif brand == 'solaredge' %}
              100
            {% endif %}
          retain: true
          # Fronius does not support a max soc modbus setting
          # Goodwe has no min or max SoC, just a target
          # SolarEdge has no min or max SoC, only SoE
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_charge_discharge_power/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_charge_discharge_power') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_charge_discharge_power') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ (states('sensor.alphaess_dispatch_active_power') | int(32000) - 32000) }}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_discharge_rate_sf') | float(0) %}
              {{ (states('sensor.fronius_current_charge_discharge_power') | float(0) * (10 ** sf)) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.solaredge_battery_power') | float(0) }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_reserved_soc_backup/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_reserved_soc_backup') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_reserved_soc_backup') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_ups_reserve_soc') | float(0) }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              # Goodwe, not supported
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_energy_percent_sf') | float(0) %}
              {{ (states('sensor.fronius_reserved_soc_backup') | float(0) * (10 ** sf)) }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_reserved_soc') | float(0) }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_max_charge_power/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_max_charging_power') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_max_charging_power') | float(0) }}
            {% elif brand == 'alphaess' %}
              {% set dispatch_value = states('sensor.alphaess_dispatch_active_power') | float(0) %}
              {% if dispatch_value < 32000 %}
                {{ 32000 - dispatch_value }}
              {% elif dispatch_value > 32000 %}
                {{ dispatch_value - 32000 }}
              {% else %}
                0
              {% endif %}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% set v = 
                  states('sensor.goodwe_battery_voltage') 
                  if states('sensor.goodwe_battery_voltage') not in ['unknown', 'unavailable'] 
                  else states('sensor.battery_voltage')
              %}
              {% set i = 
                  states('sensor.goodwe_battery_current') 
                  if states('sensor.goodwe_battery_current') not in ['unknown', 'unavailable'] 
                  else states('sensor.battery_current')
              %}
              {{ ( (v | float(0)) * (i | float(0)) ) | round(0) }}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_charge_rate_sf') | float(0) %}
              {{ (states('sensor.fronius_max_charging_power') | float(0) * (10 ** sf)) | float(0) }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_storage_charge_limit') | float(0) }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_max_discharge_power/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_max_discharging_power') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_max_discharging_power') | float(0) }}
            {% elif brand == 'alphaess' %}
            # Only one setting for AlphaESS, using current_max_charge_power instead
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% set v = 
                  states('sensor.goodwe_battery_voltage') 
                  if states('sensor.goodwe_battery_voltage') not in ['unknown', 'unavailable'] 
                  else states('sensor.battery_voltage')
              %}
              {% set i = 
                  states('sensor.goodwe_battery_current') 
                  if states('sensor.goodwe_battery_current') not in ['unknown', 'unavailable'] 
                  else states('sensor.battery_current')
              %}
              {{ ( (v | float(0)) * (i | float(0)) ) | round(0) }}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_discharge_rate_sf') | float(0) %}
              {{ (states('sensor.fronius_max_discharging_power') | float(0) * (10 ** sf)) | float(0) }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_storage_discharge_limit') | float(0) }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_export_power_limit/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_export_power_limit') | float(0) }}
            {% elif brand == 'sigenergy' %}
              {{ states('sensor.sigenergy_export_power_limit') | float(0) }}
            {% elif brand == 'alphaess' %}
              {{ states('sensor.alphaess_feed_into_grid_percent') | float(0) }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {{ states('number.goodwe_grid_export_limit') | float(0) }}
            {% elif brand == 'fronius' %}
              {% set sf = states('sensor.fronius_export_power_limit_sf') | float(0) %}
              {{ (states('sensor.fronius_export_power_limit') | float(0) * (10 ** sf)) }}
            {% elif brand == 'solaredge' %}
              {{ states('sensor.solaredge_export_power_limit') | float(0) }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/current_export_power_limit_enabled/state"
          payload: >
            {% if brand == 'sungrow' %}
              {{ states('sensor.sungrow_export_power_limit_enabled_text') | string }}
            {% elif brand == 'sigenergy' %}
              {{ 'true' if states('sensor.sigenergy_export_power_limit_enabled') | float(0) > 0 else 'false' }}
            {% elif brand == 'alphaess' %}
              {{ 'true' if states('sensor.alphaess_max_feed_into_grid_percent') | float(0) > 0 else 'false' }}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
                {{ states('switch.goodwe_grid_export_limit_switch') }}
            {% elif brand == 'fronius' %}
              {{ states('sensor.fronius_export_power_limit_enabled') | string }}
            {% elif brand == 'solaredge' %}
                true
            {% endif %}
          retain: true
  manual_activate_sungrow:
    alias: "Manual Activate Sungrow"
    icon: mdi:solar-power
    sequence:
      - service: persistent_notification.create
        data:
          title: "Starting Sungrow Activation"
          message: "Activating Sungrow configuration... Please wait."
          notification_id: manual_activation_progress
      - delay: "00:00:02"
      - service: shell_command.switch_to_sungrow
      - delay: "00:00:05"
      - service: shell_command.check_config_files
      - delay: "00:00:02"
      - service: input_select.select_option
        data:
          entity_id: input_select.inverter_brand
          option: "sungrow"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.restart_required
      - service: persistent_notification.create
        data:
          title: "✅ Manual Sungrow Activation Complete"
          message: >
            Sungrow configuration has been manually activated.
            ⚠️ MANUAL RESTART REQUIRED
            Go to Settings → System → Restart when ready.
          notification_id: manual_config_change
