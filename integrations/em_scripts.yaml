            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_max_charge_power') | int }}"
                  maximum_power: "{{ states('input_number.battery_charge_power_hardlimit') | int }}"
                  power_percentage: "{{ (power_value / maximum_power * 100) }}"
              - service: number.set_value
                target:
                  entity_id: number.goodwe_eco_mode_power
                data:
                  value: "{{ power_percentage }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - variables:
                  max_power: "{{ states('input_number.inverter_max_charge_power') | float(0) }}"
                  hardlimit: "{{ states('input_number.battery_charge_power_hardlimit') | float(1) }}"
                  pct: >
                    {% set val = (max_power / hardlimit * 100) %}
                    {% set val = [val, 0] | max %}
                    {% set val = [val, 100] | min %}
                    {{ val }}
                  raw: "{{ (pct * 100) | int }}"   # SF = -2 → ×100
              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40366           # InWRte (sheet 40367)
                  value: "{{ raw }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_max_charge_power') | float }}"
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 57358        # 0xE00E - Remote Control Charge Limit (Float32, W)
                  value: "{{ power_value }}"
  set_inverter_max_discharge_power:
    alias: "Set Inverter Max Discharge Power"
    description: "Sets maximum discharge power based on selected inverter brand"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
                  power_value: "{{ (states('input_number.inverter_max_discharge_power') | float / 10) | int }}"
              - service: modbus.write_register
                data:
                  hub: sungrow_inverter
                  unit: !secret modbus_slave
                  address: 33047
                  value: "{{ power_value }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_max_discharge_power') | int }}"
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: 247
                  address: 40034
                  value:
                    - "{{ power_value // 65536 }}"
                    - "{{ power_value % 65536 }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_max_discharge_power') | int }}"
                  dispatch_value: "{{ 32000 + power_value }}"
              - service: modbus.write_register
                data:
                  hub: alphaess_inverter
                  unit: !secret modbus_slave
                  address: 0x0881 # Set discharge power limit
                  value: "{{ dispatch_value }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand').startswith('goodwe') }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_max_discharge_power') | int }}"
                  maximum_power: "{{ states('input_number.battery_discharge_power_hardlimit') | int }}"
                  power_percentage: "{{ (power_value / maximum_power * 100) }}"
              - service: number.set_value
                target:
                  entity_id: number.goodwe_eco_mode_power
                data:
                  value: "{{ power_percentage }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - variables:
                  max_power: "{{ states('input_number.inverter_max_discharge_power') | float(0) }}"
                  hardlimit: "{{ states('input_number.battery_discharge_power_hardlimit') | float(1) }}"
                  pct: >
                    {% set val = (max_power / hardlimit * 100) %}
                    {% set val = [val, 0] | max %}
                    {% set val = [val, 100] | min %}
                    {{ val }}
                  raw: "{{ (pct * 100) | int }}"   # SF = -2 → ×100
              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40365           # OutWRte (sheet 40366)
                  value: "{{ raw }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_max_discharge_power') | float }}"
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 57360        # 0xE010 - Remote Control Discharge Limit (Float32, W)
                  value: "{{ power_value }}"
  set_inverter_pv_power_limit:
    alias: "Set Inverter PV Power Limit"
    description: "Sets maximum PV power limit based on selected inverter brand"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_pv_power_limit') | int }}"
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: 247
                  address: 40036
                  value:
                    - "{{ power_value // 65536 }}"
                    - "{{ power_value % 65536 }}"
  set_inverter_export_power_limit:
    alias: "Set Inverter Export Power Limit"
    description: "Sets export power limit based on selected inverter brand"
    sequence:
      - condition: template
        value_template: "{{ states('input_number.inverter_export_power_limit_input') != 'unknown' }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_export_power_limit_input') | int }}"
              - service: modbus.write_register
                data:
                  hub: sungrow_inverter
                  unit: !secret modbus_slave
                  address: 13073
                  value: "{{ power_value }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              # Sigenergy uses plant-level grid point maximum export limitation
              - variables:
                  power_value: "{{ states('input_number.inverter_export_power_limit_input') | int }}"
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: 247
                  address: 40038
                  value:
                    - "{{ power_value // 65536 }}"
                    - "{{ power_value % 65536 }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              - variables:
                  power_watts: "{{ states('input_number.inverter_export_power_limit_input') | int }}"
                  max_export_power: "{{ states('input_number.inverter_export_power_hardlimit') | int }}"
                  # Safety: Cap the input at the hard limit
                  safe_power_watts: "{{ [power_watts, max_export_power] | min }}"
                  # Convert watts to percentage
                  power_percentage: "{{ ((safe_power_watts / max_export_power) * 100) | round(0) | int }}"
                  # Ensure percentage is between 0-100 (should be 0-100 now due to safety cap)
                  final_percentage: "{{ [0, [power_percentage, 100] | min] | max }}"
              - service: modbus.write_register
                data:
                  hub: alphaess_inverter
                  unit: !secret modbus_slave
                  address: 0x0800 # MAX Feed into grid percent (0800H)
                  value: "{{ final_percentage }}"
              - service: modbus.write_register
                data:
                  hub: alphaess_inverter
                  unit: !secret modbus_slave
                  address: 0x0700 # Feed into grid percent (0700H)
                  value: "{{ final_percentage }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand').startswith('goodwe') }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_export_power_limit_input') | int }}"
              - service: number.set_value
                target:
                  entity_id: number.goodwe_grid_export_limit
                data:
                  value: "{{ power_value }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - variables:
                  soft_limit: "{{ states('input_number.inverter_export_power_limit_input') | float(0) }}"
                  hard_limit: "{{ states('input_number.inverter_export_power_hardlimit') | float(0) }}"

                  target_export: >
                    {% set soft = soft_limit | float(0) %}
                    {% set hard = hard_limit | float(0) %}
                    {% if hard > 0 %}
                      {{ [soft, hard] | min }}
                    {% else %}
                      {{ soft }}
                    {% endif %}

                  grid_sign: 1

                  grid_power_raw: "{{ states('sensor.fronius_grid_active_power') | float(0) }}"
                  grid_power: >
                    {% set s = grid_sign | float(1) %}
                    {{ (grid_power_raw | float(0)) * s }}

                  export_power: >
                    {% set g = grid_power | float(0) %}
                    {{ (0 - g) if g < 0 else 0 }}

                  current_limit_pct: "{{ states('input_number.wmaxlimpct') | float(100) }}"

                  tolerance_w: 100.0
                  step_pct: 1.0

                  wmaxlim_sf: "{{ states('sensor.fronius_power_output_sf') | int(-2) }}"

                  raw_100pct: >
                    {% set sf = wmaxlim_sf | int(-2) %}
                    {{ (100 * (10 ** (-sf))) | int }}

              - variables:
                  limit_enable: "{{ 1 if (target_export | float(0)) > 0 else 0 }}"

                  new_limit_pct: >
                    {% set limit = current_limit_pct | float(100) %}
                    {% set base_step = step_pct | float(5) %}
                    {% set g = grid_power | float(0) %}
                    {% set tgt_export = target_export | float(0) %}

                    {% set leak_export_w = 80.0 %}
                    {% set deadband_w = 150.0 %}
                    {% set max_step = 5.0 %}

                    {% if tgt_export <= 0 %}
                      100
                    {% else %}

                      {% set leak = [leak_export_w, tgt_export] | min %}
                      {% set setpoint = 0 - leak %}

                      {% set err = g - setpoint %}

                      {% set exp = (0 - g) if g < 0 else 0 %}

                      {% set step = base_step + (((err | float(0)) | abs) / 300.0) %}
                      {% if step > max_step %}{% set step = max_step %}{% endif %}

                      {% if exp > (tgt_export + deadband_w) %}
                        {{ [limit - step, 0] | max }}

                      {% else %}
                        {% if err > deadband_w %}
                          {{ [limit + step, 100] | min }}
                        {% elif err < -deadband_w %}
                          {{ [limit - step, 0] | max }}
                        {% else %}
                          {{ limit }}
                        {% endif %}
                      {% endif %}

                    {% endif %}

                  new_limit_raw: >
                    {% set pct = new_limit_pct | float(0) %}
                    {% set pct = [pct, 0] | max %}
                    {% set pct = [pct, 100] | min %}
                    {% set raw_100 = raw_100pct | float(10000) %}
                    {% set raw = (pct / 100.0 * raw_100) %}
                    {% set raw = [raw, 0] | max %}
                    {% set raw = [raw, raw_100] | min %}
                    {{ raw | round(0) | int }}

              - service: input_number.set_value
                target:
                  entity_id: input_number.wmaxlimpct
                data:
                  value: "{{ new_limit_pct | float(0) }}"

              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40245
                  value: 20

              - delay: "00:00:01"

              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40246
                  value: "{{ limit_enable | int(0) }}"

              - delay: "00:00:01"

              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40242
                  value: "{{ new_limit_raw | int(0) }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - variables:
                  w: "{{ states('input_number.inverter_export_power_limit_input') | int(0) }}"

              # One-time setup (safe to repeat)
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 61762        # 0xF142 AdvancedPwrControlEn (Int32)
                  value: [0, 1]         # write 2 regs via FC16 (0x10)
              - delay: "00:00:01"

              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 63232        # 0xF700 Export Control Mode (mirror of E000)
                  value: 1              # Direct export limitation
              - delay: "00:00:01"

              # Dynamic Export Control Site Limit (Float32 W) via lookup table
              - choose:
                  - conditions: "{{ w == 0 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346        # 0xE002 Export Control Site Limit (Float32, W)
                          value: [0, 0]

                  - conditions: "{{ w == 100 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [0, 17096]

                  - conditions: "{{ w == 500 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17402, 0]

                  - conditions: "{{ w == 1000 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17530, 0]

                  - conditions: "{{ w == 2500 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17692, 16384]

                  - conditions: "{{ w == 3150 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17732, 57344]

                  - conditions: "{{ w == 5000 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17820, 16384]

                  - conditions: "{{ w == 6300 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17860, 57344]

                  - conditions: "{{ w == 7500 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17898, 24576]

                  - conditions: "{{ w == 10000 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [17948, 16384]

                  - conditions: "{{ w == 15000 }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57346
                          value: [18026, 24576]

                default:
                  # If input_number is set to an unsupported value, do nothing (safer than forcing 0W)
                  - stop: "Unsupported SolarEdge export limit value"

              - delay: "00:00:01"

              # Commit (required)
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 61696        # 0xF100 Commit
                  value: 1
  set_inverter_export_power_limit_enabled:
    alias: "Set Inverter Export Power Limit Enabled"
    description: "Enables/disables export power limit based on selected inverter brand"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
                  enabled_value: >
                    {% if is_state('input_boolean.inverter_export_power_limit_enabled_input', 'on') %}
                      170
                    {% else %}
                      85
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: sungrow_inverter
                  unit: !secret modbus_slave
                  address: 13086
                  value: "{{ enabled_value | int }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              # Sigenergy export power limits are always active when set The enable/disable is implicit through setting the limit value
              - service: system_log.write
                data:
                  message: "Sigenergy export power limit enable/disable is implicit through limit value setting"
                  level: info
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand').startswith('goodwe')}}"
            sequence:
              - variables:
                  enabled_value: >
                    {% if is_state('input_boolean.inverter_export_power_limit_enabled_input', 'on') %}
                      on
                    {% else %}
                      off
                    {% endif %}
              - service: number.set_value
                target:
                  entity_id: switch.goodwe_grid_export_limit_switch
                data:
                  value: "{{ enabled_value }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - variables:
                  enabled_value: >
                    {% if is_state('input_boolean.inverter_export_power_limit_enabled_input', 'on') %}
                      1
                    {% else %}
                      0
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40246 # WMaxLim_Ena - Throttle enable/disable control
                  value: "{{ enabled_value | int }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - variables:
                  enabled_value: >
                    {% if is_state('input_boolean.inverter_export_power_limit_enabled_input', 'on') %}
                      1
                    {% else %}
                      0
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 57345
                  value: "{{ enabled_value | int }}"
  goodwe_eh_reset_all_8slots:
    alias: "GoodWe EH: Reset all 8 schedule slots"
    sequence:
      - repeat:
          count: 8
          sequence:
            - variables:
                i: "{{ repeat.index }}"
                base8: "{{ 47547 + (i - 1) * 6 }}"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base8 + 0 }}"
                value: 0
            - delay: "00:00:01"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base8 + 1 }}"
                value: 1
            - delay: "00:00:01"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base8 + 2 }}"
                value: 0
            - delay: "00:00:01"
  goodwe_reset_all_4slots:
    alias: "GoodWe ET/ESA: Reset all 4 schedule slots"
    sequence:
      - service: modbus.write_register
        data:
          hub: goodwe_inverter
          unit: !secret modbus_slave
          address: 47612
          value: 0
      - delay: "00:00:01"
      - repeat:
          count: 4
          sequence:
            - variables:
                i: "{{ repeat.index }}"
                base4: "{{ 47515 + (i - 1) * 4 }}"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base4 + 3 }}"
                value: 0
            - delay: "00:00:01"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base4 + 2 }}"
                value: 0
            - delay: "00:00:01"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base4 + 0 }}"
                value: 0
            - delay: "00:00:01"
            - service: modbus.write_register
              data:
                hub: goodwe_inverter
                unit: !secret modbus_slave
                address: "{{ base4 + 1 }}"
                value: 1
            - delay: "00:00:01"
  debug_modbus_files:
    alias: "Debug Modbus Files"
    description: "Check what modbus files exist and their contents"
    sequence:
      - service: shell_command.list_modbus_files
      - delay: "00:00:02"
      - service: persistent_notification.create
        data:
          title: "Modbus Files Debug Complete"
          message: >
            File list has been saved to /config/modbus_files_list.txt
            You can check this file in the File Editor to see what modbus files exist.
          notification_id: "modbus_debug"
  test_shell_commands:
    alias: "Test Shell Commands"
    description: "Test if shell commands work"
    sequence:
      - service: shell_command.test_shell
      - delay: "00:00:02"
      - service: persistent_notification.create
        data:
          title: "Shell Test Complete"
          message: >
            Check if file /config/shell_test.txt was created.
            If it exists, shell commands are working.
          notification_id: "shell_test"
  publish_inverter_data:
    alias: "Publish Inverter Data to MQTT"
    description: "Reads modbus data and publishes to MQTT every 10 seconds"
    sequence:
      - variables:
          brand: "{{ states('input_select.inverter_brand') }}"
      - condition: template
        value_template: "{{ brand in ['sungrow', 'sigenergy', 'alphaess', 'goodwe', 'goodwe_et', 'fronius', 'solaredge'] }}"
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/pv_power/state"
          payload: >
            {% set additional = states('sensor.additional_pv_power') | float(0) %}
            {% if brand == 'sungrow' %}
              {{ (states('sensor.sungrow_pv_power') | float(0) + additional) | round(0) }}
            {% elif brand == 'sigenergy' %}
              {{ (states('sensor.sigenergy_pv_power') | float(0) + additional) | round(0) }}
            {% elif brand == 'alphaess' %}
              {% if states('sensor.alphaess_total_active_pv_power') not in ['unknown', 'unavailable'] %}
                {{ (states('sensor.alphaess_total_active_pv_power') | float(0) + additional) | round(0) }}
              {% elif states('sensor.alphaess_pv_power') not in ['unknown', 'unavailable'] %}
                {{ (states('sensor.alphaess_pv_power') | float(0) + additional) | round(0) }}
              {% else %}
                {{ additional | round(0) }}
              {% endif %}
            {% elif brand in ['goodwe', 'goodwe_et'] %}
              {% if states('sensor.goodwe_pv_power') not in ['unknown', 'unavailable'] %}
                {{ (states('sensor.goodwe_pv_power') | float(0) + additional) | round(0) }}
              {% elif states('sensor.pv_power') not in ['unknown', 'unavailable'] %}
                {{ (states('sensor.pv_power') | float(0) + additional) | round(0) }}
              {% else %}
                {{ additional | round(0) }}
              {% endif %}
            {% elif brand == 'fronius' %}
              {% set pv1 = states('sensor.fronius_pv1_power_raw') | float(0) %}
              {% set pv2 = states('sensor.fronius_pv2_power_raw') | float(0) %}
              {% set sf = states('sensor.fronius_dcpower_sf') | int(0) %}
              {% set pvsum_raw = pv1 + pv2 %}
              {% set pvsum = (pvsum_raw * (10 ** sf)) | round(0) %}
              {{ (pvsum | float(0)  + additional) | round(0) }}
            {% elif brand == 'solaredge' %}
              {% set ap = states('sensor.solaredge_inv_active_power') | float(0) %}
              {% set ap_sf = states('sensor.solaredge_inv_active_power_sf') | float(0) %} 
              {% set batt = states('sensor.solaredge_battery_power') | float(0) %}
              {% set real_ap = ap * (10 ** ap_sf) %}
              {{ (real_ap + batt  + additional) | round(0) }}
            {% else %}
              {{ additional | round(0) }}
            {% endif %}
          retain: true
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/pv_power_limit/state"
          payload: >
            {% if brand == 'sigenergy' %}
