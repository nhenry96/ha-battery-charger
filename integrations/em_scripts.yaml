  set_inverter_charge_discharge_power:
    alias: "Set Inverter Charge/Discharge Power"
    description: "Sets charge/discharge power based on selected inverter brand"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_charge_discharge_power') | int }}"
              - service: modbus.write_register
                data:
                  hub: sungrow_inverter
                  unit: !secret modbus_slave
                  address: 13051
                  value: "{{ power_value }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_charge_discharge_power') | float }}"
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: 247
                  address: 40029
                  value: 1 # Enable Remote EMS
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: 247
                  address: 40032
                  value:
                    - "{{ (power_value // 65536) | int }}"
                    - "{{ (power_value % 65536) | int }}"
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  slave: 247
                  address: 40034
                  value:
                    - "{{ (power_value // 65536) | int }}"
                    - "{{ (power_value % 65536) | int }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              # AlphaESS uses time-based control rather than direct power setting Set dispatch mode for power control
              - variables:
                  power_value: "{{ states('input_number.inverter_charge_discharge_power') | int }}"
              - service: modbus.write_register
                data:
                  hub: alphaess_inverter
                  unit: !secret modbus_slave
                  address: 0x0881 # Dispatch Active power (0881H-0882H)
                  value:
                    - "{{ (power_value + 32000) // 65536 }}"
                    - "{{ (power_value + 32000) % 65536 }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand').startswith('goodwe') }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_charge_discharge_power') | int }}"
                  maximum_power: "{{ states('input_number.battery_charge_power_hardlimit') | int }}"
                  power_percentage: "{{ (power_value / maximum_power * 100) }}"
              - service: number.set_value
                target:
                  entity_id: number.goodwe_eco_mode_power
                data:
                  value: "{{ power_percentage }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - variables:
                  power_limit: "{{ states('input_number.inverter_charge_discharge_power') | float(0) }}"
                  max_charge_hw: "{{ states('sensor.fronius_max_charging_power') | float(0) }}"
                  max_discharge_hw: "{{ states('sensor.fronius_max_discharging_power') | float(0) }}"
                  max_user_set_power: "{{ states('input_number.inverter_max_charge_power') | float(0) }}"
                  # overall HW/user cap (ignore zeros)
                  hw_limit: >
                    {% set vals = [max_charge_hw, max_discharge_hw, max_user_set_power]
                                  | map('float') | list %}
                    {% set vals = vals | select('gt', 0) | list %}
                    {{ vals | min if vals | length > 0 else 0 }}
                  clamped_power: "{{ [power_limit, hw_limit] | min }}"
              - if:
                  - condition: template
                    value_template: "{{ power_limit != clamped_power }}"
                then:
                  - service: system_log.write
                    data:
                      message: "Power limit {{ power_limit }}W exceeds hardware/user limit {{ hw_limit }}W, clamped to {{ clamped_power }}W"
                      level: warning
              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40365        # OutWRte (HA address)
                  value: >
                    {% set denom = max_discharge_hw | float(0) %}
                    {% set pct = (clamped_power / denom * 100) if denom > 0 else 0 %}
                    {% set pct = [pct, 0] | max %}
                    {% set pct = [pct, 100] | min %}
                    {# InOutWRte_SF = -2 -> raw = pct * 100 #}
                    {{ (pct * 100) | int }}
              - service: modbus.write_register
                data:
                  hub: fronius_inverter
                  unit: !secret modbus_slave
                  address: 40366        # InWRte (HA address)
                  value: >
                    {% set denom = max_charge_hw | float(0) %}
                    {% set pct = (clamped_power / denom * 100) if denom > 0 else 0 %}
                    {% set pct = [pct, 0] | max %}
                    {% set pct = [pct, 100] | min %}
                    {{ (pct * 100) | int }}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - variables:
                  power_value: "{{ states('input_number.inverter_charge_discharge_power') | float }}"
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 57358        # 0xE00E - Remote Control Charge Limit (Float32, W)
                  value: "{{ power_value }}"

              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 57360        # 0xE010 - Remote Control Discharge Limit (Float32, W)
                  value: "{{ power_value }}"
  set_inverter_max_charge_power:
    alias: "Set Inverter Max Charge Power"
    description: "Sets maximum charge power based on selected inverter brand"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
