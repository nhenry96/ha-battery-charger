# scripts.yaml 
# === ENERGY_MANAGER_SCRIPTS_START v0.3.3 ===
script:
  switch_inverter_brand:
    alias: "Switch Inverter Brand"
    description: "Switches the active modbus configuration based on selected brand"
    sequence:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "sungrow"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting Sungrow Activation"
                  message: "Activating Sungrow configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_sungrow
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "sigenergy"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting Sigenergy Activation"
                  message: "Activating Sigenergy configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_sigenergy
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "alphaess"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting AlphaESS Activation"
                  message: "Activating AlphaESS configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_alphaess
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "goodwe"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting Goodwe Activation"
                  message: "Activating Goodwe configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_goodwe
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "goodwe_et"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting Goodwe ET Activation"
                  message: "Activating Goodwe ET configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_goodwe_et
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "fronius"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting Fronius Activation"
                  message: "Activating Fronius configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_fronius
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
          - conditions:
              - condition: state
                entity_id: input_select.inverter_brand
                state: "solaredge"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Starting SolarEdge Activation"
                  message: "Activating SolarEdge configuration... Please wait."
                  notification_id: manual_activation_progress
              - delay: "00:00:01"
              - service: shell_command.switch_to_solaredge
              - delay: "00:00:01"
              - service: shell_command.check_config_files
              - delay: "00:00:01"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.restart_required
      - service: persistent_notification.create
        data:
          title: "✅ Manual {{ states('input_select.inverter_brand') | title }} Activation Complete"
          message: >
            {{ states('input_select.inverter_brand') | title }} configuration has been activated but a restart is required.
            ⚠️ MANUAL RESTART REQUIRED
            Go to Settings → System → Restart when ready.
          notification_id: inverter_config_change
  set_inverter_ems_mode:
    alias: "Set Inverter EMS Mode"
    description: "Sets EMS mode based on selected inverter brand"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - variables:
                  mode_value: >
                    {% set mode_text = states('input_select.inverter_ems_mode') %}
                    {% if mode_text == 'Self-Consumption mode' %}
                      0
                    {% elif mode_text == 'Forced Mode' %}
                      2
                    {% elif mode_text == 'External EMS' %}
                      3
                    {% elif mode_text == 'VPP' %}
                      4
                    {% else %}
                      0
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: sungrow_inverter
                  unit: !secret modbus_slave
                  address: 13049
                  value: "{{ mode_value | int }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - variables:
                  mode_value: >
                    {% set mode_text = states('input_select.inverter_ems_mode') %}
                    {% if mode_text == 'Self-Consumption mode' %}
                      0
                    {% else %}
                      1
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: sigenergy_inverter
                  unit: 247
                  address: 40029 # (EMS mode)
                  value: "{{ mode_value | int }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              - variables:
                  mode_value: >
                    {% set mode_text = states('input_select.inverter_ems_mode') %}
                    {% if mode_text == 'Forced Mode' %}
                      1
                    {% else %}
                      0
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: alphaess_inverter
                  unit: !secret modbus_slave
                  address: 0x0880 # Dispatch Start (0880H)
                  value: "{{ mode_value | int }}"
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - variables:
                  mode_value: >
                    {% set mode_text = states('input_select.inverter_ems_mode') %}
                    {% if mode_text == 'Self-Consumption mode' %}
                      1
                    {% elif mode_text == 'External EMS' %}
                      3
                    {% endif %}
              - service: modbus.write_register
                data:
                  hub: solaredge_inverter
                  unit: !secret modbus_slave
                  address: 57348      # 0xE004 Storage Control Mode
                  value: "{{ mode_value | int }}"
  set_inverter_charge_discharge_mode:
    alias: "Set Inverter Charge/Discharge Mode"
    description: "Sets charge/discharge mode using generic options mapped to brand-specific implementations"
    fields:
      option:
        description: "Generic mode option (Stop, Forced Charge, Forced Discharge)"
        example: "Self Consumption"
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sungrow' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: sungrow_inverter
                          unit: !secret modbus_slave
                          address: 13050 # Charge/discharge command
                          value: 204 # Stop (0xCC)
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: sungrow_inverter
                          unit: !secret modbus_slave
                          address: 13050 # Charge/discharge command
                          value: 170 # Charge (0xAA)
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: sungrow_inverter
                          unit: !secret modbus_slave
                          address: 13050 # Charge/discharge command
                          value: 187 # Discharge (0xBB)
                default:
                  - service: system_log.write
                    data:
                      message: "Unknown Sungrow mode option: {{ option }}"
                      level: warning
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'sigenergy' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: sigenergy_inverter
                          unit: 247
                          address: 40031 # ems mode command
                          value: 2 # Stop
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: sigenergy_inverter
                          unit: 247
                          address: 40029 # (EMS mode)
                          value: 0
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: sigenergy_inverter
                          unit: 247
                          address: 40029 # (EMS mode)
                          value: 1
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: sigenergy_inverter
                          unit: 247
                          address: 40031 # ems mode command
                          value: 4 # Charge
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: sigenergy_inverter
                          unit: 247
                          address: 40029 # (EMS mode)
                          value: 1
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: sigenergy_inverter
                          unit: 247
                          address: 40031 # ems mode command
                          value: 5 # Discharge
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'alphaess' }}"
            sequence:
              # AlphaESS uses dispatch mode for charge/discharge control
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0880 # Dispatch Start
                          value: 0 # Disable dispatch
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0881 # Dispatch Active power (0881H-0882H)
                          value:
                            - 0
                            - 32000
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0885 # Dispatch Mode (0 = default, 2 = Go) (0885H)
                          value: 0
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0880 # Dispatch Start
                          value: 1 # Enable dispatch
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0881 # Dispatch Active power (0881H-0882H)
                          value:
                            - "{{ (32000 - states('input_number.inverter_charge_discharge_power') | int) // 65536 }}"
                            - "{{ (32000 - states('input_number.inverter_charge_discharge_power') | int) % 65536 }}"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0886 # Dispatch SOC (0.4%/bit) (0886H)
                          value: "{{ (states('input_number.inverter_max_soc') | int) / 0.4 }}"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0887 # Dispatch Time (0887H-0888H)
                          value:
                            - 0
                            - 10800 # 3hrs
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0885 # Dispatch Mode (0 = default, 2 = Go) (0885H)
                          value: 2
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0880 # Dispatch Start (0880H)
                          value: 1 # Enable dispatch
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0881 # Dispatch Active power (0881H-0882H)
                          value:
                            - "{{ (states('input_number.inverter_charge_discharge_power') | int + 32000) // 65536 }}"
                            - "{{ (states('input_number.inverter_charge_discharge_power') | int + 32000) % 65536 }}"
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0886 # Dispatch SOC (0.4%/bit) (0886H)
                          value: "{{ (states('input_number.inverter_min_soc') | int) / 0.4 }}"
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0887 # Dispatch Time (0887H-0888H)
                          value:
                            - 0
                            - 10800 # 3hrs
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: alphaess_inverter
                          unit: !secret modbus_slave
                          address: 0x0885 # Dispatch Mode (0 = default, 2 = Go) (0885H)
                          value: 2
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'goodwe' }}"
            sequence:
              - variables:
                  slot8_raw: "{{ states('input_number.goodwe_schedule_8slot') | int(1) }}"
                  slot8: "{{ [1, [8, slot8_raw] | min] | max }}"
                  base8: "{{ 47547 + (slot8 - 1) * 6 }}"
                  addr_start: "{{ base8 + 0 }}"
                  addr_end: "{{ base8 + 1 }}"
                  addr_week: "{{ base8 + 2 }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_start }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_end }}"
                          value: 1
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_week }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_power
                        data:
                          value: 0
                      - delay: "00:00:01"
                      - service: select.select_option
                        target:
                          entity_id: select.goodwe_inverter_operation_mode
                        data:
                          option: general
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_power
                        data:
                          value: >-
                            {% set max = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set hard = states('input_number.battery_charge_power_hardlimit') | float(0) %}
                            {% if hard <= 0 %}
                              0
                            {% else %}
                              {{ [0, [100, (max / hard * 100)] | min] | max | round(0) }}
                            {% endif %}
                      - delay: "00:00:01"
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_soc
                        data:
                          value: "{{ states('input_number.inverter_max_soc') | int }}"
                      - delay: "00:00:01"
                      - service: select.select_option
                        target:
                          entity_id: select.goodwe_inverter_operation_mode
                        data:
                          option: eco_charge
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_start }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_end }}"
                          value: 5947
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_week }}"
                          value: 65407
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_power
                        data:
                          value: >-
                            {% set max = states('input_number.inverter_max_discharge_power') | float(0) %}
                            {% set hard = states('input_number.battery_discharge_power_hardlimit') | float(0) %}
                            {% if hard <= 0 %}
                              0
                            {% else %}
                              {{ [0, [100, (max / hard * 100)] | min] | max | round(0) }}
                            {% endif %}
                      - delay: "00:00:01"
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_soc
                        data:
                          value: "{{ states('input_number.inverter_min_soc') | int }}"
                      - delay: "00:00:01"
                      - service: select.select_option
                        target:
                          entity_id: select.goodwe_inverter_operation_mode
                        data:
                          option: eco_discharge
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_start }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_end }}"
                          value: 5947
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ addr_week }}"
                          value: 65407
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'goodwe_et' }}"
            sequence:
              - variables:
                  slot4_raw: "{{ states('input_number.goodwe_schedule_4slot') | int(1) }}"
                  slot4: "{{ [1, [4, slot4_raw] | min] | max }}"
                  base4: "{{ 47515 + (slot4 - 1) * 4 }}"
                  a0: "{{ base4 + 0 }}"
                  a1: "{{ base4 + 1 }}"
                  a2: "{{ base4 + 2 }}"
                  a3: "{{ base4 + 3 }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: 47612
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a3 }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a2 }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a0 }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a1 }}"
                          value: 1
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_soc
                        data:
                          value: "{{ (states('input_number.inverter_max_soc') | int) }}"
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: 47612
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: 47612
                          value: 1
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a0 }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a1 }}"
                          value: 5947
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a2 }}"
                          value: >-
                            {% set max_w  = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set hard_w = states('input_number.battery_charge_power_hardlimit') | float(0) %}
                            {% if hard_w <= 0 %}
                              0
                            {% else %}
                              {% set p = (max_w / hard_w * 1000) %}
                              {% set p = ([0, [1000, p] | min] | max) | round(0) | int %}
                              {{ 65536 - p }}
                            {% endif %}
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a3 }}"
                          value: 63871
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - service: number.set_value
                        target:
                          entity_id: number.goodwe_eco_mode_soc
                        data:
                          value: "{{ states('input_number.inverter_min_soc') | int }}"
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: 47612
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: 47612
                          value: 1
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a0 }}"
                          value: 0
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a1 }}"
                          value: 5947
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a2 }}"
                          value: >-
                            {% set max_w  = states('input_number.inverter_max_discharge_power') | float(0) %}
                            {% set hard_w = states('input_number.battery_discharge_power_hardlimit') | float(0) %}
                            {% if hard_w <= 0 %}
                              0
                            {% else %}
                              {% set p = (max_w / hard_w * 1000) %}
                              {% set p = ([0, [1000, p] | min] | max) | round(0) | int %}
                              {{ p }}
                            {% endif %}
                      - delay: "00:00:01"
                      - service: modbus.write_register
                        data:
                          hub: goodwe_inverter
                          unit: !secret modbus_slave
                          address: "{{ a3 }}"
                          value: 63871
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'fronius' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40355        # WChaMax
                          value: >
                            {% set w = states('sensor.fronius_wchamax') | float(0) %}
                            {% set sf = states('sensor.fronius_max_charging_power_sf') | int(0) %}
                            {{ (w / (10 ** sf)) | round(0) | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40358        # StorCtl_Mod
                          value: 0
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40365        # OutWRte
                          value: >
                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}
                            {{ raw_100 | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40366        # InWRte
                          value: >
                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}
                            {{ raw_100 | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40360        # MinRsvPct
                          value: >
                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}
                            {% set min_soc = states('input_number.inverter_reserved_soc_backup') | float(0) %}
                            {% set part = (min_soc / 100 * raw_100) %}
                            {% set part = [part, 0] | max %}
                            {% set part = [part, raw_100] | min %}
                            {{ part | int }}
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40355        # WChaMax
                          value: >
                            {% set user_max_w = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set sf = states('sensor.fronius_max_charging_power_sf') | int(0) %}
                            {{ (user_max_w / (10 ** sf)) | round(0) | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40358        # StorCtl_Mod
                          value: 2
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40365        # OutWRte
                          value: >
                            {% set desired_w = states('input_number.inverter_charge_discharge_power') | float(0) %}
                            {% set user_max_w = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set eff_w = [desired_w, user_max_w] | min %}
                            {% set inv_max_w = states('sensor.fronius_wchamax') | float(1) %}

                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}

                            {% set part = (eff_w / inv_max_w * raw_100) if inv_max_w > 0 else 0 %}
                            {% set part = [part, 0] | max %}
                            {% set part = [part, raw_100] | min %}
                            {{ (65536 - part) | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40366        # InWRte
                          value: >
                            {% set desired_w = states('input_number.inverter_charge_discharge_power') | float(0) %}
                            {% set user_max_w = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set eff_w = [desired_w, user_max_w] | min %}
                            {% set inv_max_w = states('sensor.fronius_wchamax') | float(1) %}

                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}

                            {% set part = (eff_w / inv_max_w * raw_100) if inv_max_w > 0 else 0 %}
                            {% set part = [part, 0] | max %}
                            {% set part = [part, raw_100] | min %}
                            {{ part | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40360        # MinRsvPct
                          value: >
                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}
                            {% set part = 99 / 100 * raw_100 %}
                            {% set part = [part, 0] | max %}
                            {% set part = [part, raw_100] | min %}
                            {{ part | int }}
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40355        # WChaMax
                          value: >
                            {% set user_max_w = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set sf = states('sensor.fronius_max_charging_power_sf') | int(0) %}
                            {{ (user_max_w / (10 ** sf)) | round(0) | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40358        # StorCtl_Mod
                          value: 3
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40366        # InWRte
                          value: >
                            {% set desired_w = states('input_number.inverter_charge_discharge_power') | float(0) %}
                            {% set user_max_w = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set eff_w = [desired_w, user_max_w] | min %}
                            {% set inv_max_w = states('sensor.fronius_wdischamax') | float(states('sensor.fronius_wchamax') | float(1)) %}

                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}

                            {% set part = (eff_w / inv_max_w * raw_100) if inv_max_w > 0 else 0 %}
                            {% set part = [part, 0] | max %}
                            {% set part = [part, raw_100] | min %}
                            {{ (65536 - part) | int }}
                      - service: modbus.write_register
                        data:
                          hub: fronius_inverter
                          unit: !secret modbus_slave
                          address: 40365        # OutWRte
                          value: >
                            {% set desired_w = states('input_number.inverter_charge_discharge_power') | float(0) %}
                            {% set user_max_w = states('input_number.inverter_max_charge_power') | float(0) %}
                            {% set eff_w = [desired_w, user_max_w] | min %}
                            {% set inv_max_w = states('sensor.fronius_wdischamax') | float(states('sensor.fronius_wchamax') | float(1)) %}

                            {% set sf = states('sensor.fronius_max_charging_discharging_percent_sf') | int(-2) %}
                            {% set raw_100 = 100 * (10 ** (-sf)) %}

                            {% set part = (eff_w / inv_max_w * raw_100) if inv_max_w > 0 else 0 %}
                            {% set part = [part, 0] | max %}
                            {% set part = [part, raw_100] | min %}
                            {{ part | int }}
          - conditions:
              - condition: template
                value_template: "{{ states('input_select.inverter_brand') == 'solaredge' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Stop' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57357        # 0xE00D - Remote Control Command Mode
                          value: 0              # 0 = Off (no charge/discharge)
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Charge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57357        # 0xE00D - Remote Control Command Mode
                          value: 3              # 3 = Charge from PV+AC (forced charge)
                  - conditions:
                      - condition: template
                        value_template: "{{ option == 'Forced Discharge' }}"
                    sequence:
                      - service: modbus.write_register
                        data:
                          hub: solaredge_inverter
                          unit: !secret modbus_slave
                          address: 57357        # 0xE00D - Remote Control Command Mode
                          value: 4              # 4 = Maximize export (forced discharge)
        default:
          - service: system_log.write
            data:
              message: "Unknown inverter brand: {{ states('input_select.inverter_brand') }}"
              level: error
