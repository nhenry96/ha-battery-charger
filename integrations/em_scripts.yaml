              {% elif states('sensor.today_battery_charge') not in ['unknown', 'unavailable'] %}
                {{ states('sensor.today_battery_charge') | float(0) }}
              {% else %}
                0
              {% endif %}
            {% elif brand == 'fronius' %}
              0
            {% endif %}
          retain: true
          # Fronius does not track daily battery discharge
          # SolarEdge does not track daily battery discharge
      # Publish Energy Data (Total)
      - service: mqtt.publish
        data:
          topic: "homeassistant/sensor/inverter/total_battery_charge/state"
          payload: >
            {% if brand == 'sungrow' %}
