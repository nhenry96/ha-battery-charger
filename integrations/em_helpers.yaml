# Energy Manager Helper File
# This file supports intelligent updates through section markers

# === ENERGY_MANAGER_SHELL_COMMANDS_START v0.3.2 ===
shell_command:
  electricity_load: "python3 /config/scripts/electricity_dashboard.py load"
  electricity_update: "python3 /config/scripts/electricity_dashboard.py update '{{ data }}'"
  electricity_direct: "python3 /config/scripts/electricity_dashboard.py direct {{ hour }} {{ watts }}"
  read_electricity_log: "cat /config/electricity_dashboard.log > /config/electricity_log_latest.txt"
  read_baseline_csv: "cat /config/baseline-consumption.csv"
  test_shell: echo "Shell command working" > /config/shell_test.txt
  switch_to_sungrow: cp /config/sungrow_modbus.yaml.disabled /config/modbus.yaml
  switch_to_sigenergy: cp /config/sigenergy_modbus.yaml.disabled /config/modbus.yaml
  switch_to_alphaess: cp /config/alphaess_modbus.yaml.disabled /config/modbus.yaml
  switch_to_goodwe: cp /config/goodwe_modbus.yaml.disabled /config/modbus.yaml
  switch_to_goodwe_et: cp /config/goodwe_modbus.yaml.disabled /config/modbus.yaml
  switch_to_fronius: cp /config/fronius_modbus.yaml.disabled /config/modbus.yaml
  switch_to_solaredge: cp /config/solaredge_modbus.yaml.disabled /config/modbus.yaml
  list_modbus_files: ls -la /config/*modbus* > /config/modbus_files_list.txt
  check_config_files: "cd /config; ls -la *modbus.yaml*"
  get_available_version: "cat /config/.energy_manager/update_status.txt 2>/dev/null || echo 'unknown'"
  get_changelog_direct: 'python3 -c "import json; data=json.load(open(''/config/.energy_manager/update_details.json'')); print(data.get(''changelog'', ''No changelog available''))" 2>/dev/null || echo ''No changelog available'''
  check_energy_manager_updates: "python3 /config/scripts/check_energy_manager_updates.py"
  perform_energy_manager_update: "python3 /config/scripts/perform_energy_manager_update.py"
  perform_energy_manager_update_force: "python3 /config/scripts/perform_energy_manager_update.py --force-reinstall"
  generate_ssh_key: 'mkdir -p /config/.energy_manager && ssh-keygen -t ed25519 -f /config/.energy_manager/ssh_key -N "" -C "energy_manager_automation"'
  read_ssh_key: 'cat /config/.energy_manager/ssh_key.pub 2>/dev/null || echo "no_key"'
  em_grafana_setup: 'python3 /config/scripts/em_grafana_setup.py'

rest_command:
  em_motd_mark_read:
    url: "http://localhost:1880/endpoint/em/motd/mark_read"
    method: POST
    content_type: "application/json"
    payload: '{"source":"dashboard"}'
# === ENERGY_MANAGER_SHELL_COMMANDS_END ===

# === ENERGY_MANAGER_SENSORS_START v0.3.2 ===
sensor:
  - platform: command_line
    name: energy_manager_changelog_reader
    command: "cat /config/.energy_manager/changelog_simple.txt 2>/dev/null || echo 'No changelog available'"
    scan_interval: 30

  # Total Energy Sensors
  - platform: integration
    source: sensor.inverter_import_power
    name: "Imported Energy Total"
    unique_id: imported_energy_total
    unit_prefix: k
    unit_time: h
    method: left
    max_sub_interval:
      minutes: 5

  - platform: integration
    source: sensor.inverter_export_power
    name: "Exported Energy Total"
    unique_id: exported_energy_total
    unit_prefix: k
    unit_time: h
    method: left
    max_sub_interval:
      minutes: 5

  - platform: integration
    source: sensor.inverter_pv_power
    name: "PV Energy Total"
    unique_id: pv_energy_total
    method: left
    unit_prefix: k
    unit_time: h
    max_sub_interval:
      minutes: 5

  - platform: integration
    source: sensor.inverter_battery_charging_power
    name: "Battery Charging Total"
    unique_id: batt_charge_energy_total
    unit_prefix: k
    unit_time: h
    method: left
    max_sub_interval:
      minutes: 5

  - platform: integration
    source: sensor.inverter_battery_discharging_power
    name: "Battery Discharging Total"
    unique_id: batt_discharge_energy_total
    unit_prefix: k
    unit_time: h
    method: left
    max_sub_interval:
      minutes: 5

command_line:
  - sensor:
      name: "Energy Manager Current Version"
      unique_id: energy_manager_current_version
      command: "cat /config/.energy_manager/version.txt"
      value_template: "{{ value.strip() }}"
      scan_interval: 300 # Check every 5 minutes

  - sensor:
      name: "Energy Manager Decision"
      unique_id: energy_manager_decision
      command: "cat /share/api_data.txt 2>/dev/null || true"
      scan_interval: 60

  - sensor:
      name: "Energy Manager Decision Timestamp"
      unique_id: energy_manager_decision_timestamp
      command: "stat -c %Y /share/api_data.txt || date +%s"
      scan_interval: 300
      command_timeout: 15
      value_template: "{{ value | trim }}"

  - binary_sensor:
      name: "SSH Key Exists"
      unique_id: ssh_key_exists
      command: 'test -f /config/.energy_manager/ssh_key && echo "found" || echo "not_found"'
      payload_on: "found"
      payload_off: "not_found"

# === ENERGY_MANAGER_SENSORS_END ===

