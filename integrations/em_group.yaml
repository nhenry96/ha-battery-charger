# === ENERGY_MANAGER_GROUPS_START v0.3.2 ===
## test
group:
  inverter_management:
    name: "Inverter Management"
    entities:
      - input_select.inverter_brand
      - sensor.configuration_status
      - input_boolean.restart_required
      - binary_sensor.sungrow_active
      - binary_sensor.sigenergy_active
      - binary_sensor.alphaess_active
      - binary_sensor.fronius_active
      - binary_sensor.goodwe_active
      - binary_sensor.goodwe_et_active
      - binary_sensor.solaredge_active
  inverter_manual_controls:
    name: "Manual Configuration Controls"
    entities:
      - script.manual_activate_sungrow
      - script.manual_activate_sigenergy
      - script.manual_activate_alphaess
      - script.manual_activate_fronius
      - script.manual_activate_goodwe
      - script.manual_activate_goodwe_et
      - script.manual_activate_solaredge
      - script.check_config_status
  energy_manager_updates:
    name: "Energy Manager Updates"
    entities:
      - sensor.energy_manager_update_status
      - sensor.energy_manager_current_version
      - input_text.energy_manager_available_version
      - input_boolean.energy_manager_update_available
      - input_datetime.energy_manager_last_update_check
      - input_boolean.energy_manager_auto_update_check
      - script.check_for_energy_manager_updates
      - script.update_energy_manager
# === ENERGY_MANAGER_GROUPS_END ===
