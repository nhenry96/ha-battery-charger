      device_class: energy
      state_class: total_increasing
      icon: mdi:transmission-tower-import

    - name: "Inverter Total Exported Energy"
      unique_id: "inverter_total_exported_energy_mqtt"
      state_topic: "homeassistant/sensor/inverter/total_exported_energy/state"
