      device_class: power
      state_class: measurement
      icon: mdi:lightning-bolt

    - name: "Inverter Battery Charge"
      unique_id: "inverter_battery_charge_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_charge/state"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      icon: mdi:battery-charging-100

    - name: "Inverter Battery Capacity"
      unique_id: "inverter_battery_capacity_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_capacity/state"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total
      icon: mdi:battery-outline

    - name: "Inverter Battery SOH"
      unique_id: "inverter_battery_soh_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_soh/state"
