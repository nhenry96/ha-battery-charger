      device_class: battery
      state_class: measurement
      icon: mdi:battery

    - name: "Inverter Current Charge Discharge Power"
      unique_id: "inverter_current_charge_discharge_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/current_charge_discharge_power/state"
