      unique_id: "inverter_daily_pv_generation_mqtt"
      state_topic: "homeassistant/sensor/inverter/daily_pv_generation/state"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      icon: mdi:solar-power

    - name: "Inverter Daily Battery Charge"
      unique_id: "inverter_daily_battery_charge_mqtt"
      state_topic: "homeassistant/sensor/inverter/daily_battery_charge/state"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      icon: mdi:battery-charging

    - name: "Inverter Daily Battery Discharge"
