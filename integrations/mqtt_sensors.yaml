# === ENERGY_MANAGER_MQTT_SENSORS_START v0.3.3 ===
mqtt:
  sensor:
    # Power Sensors
    - name: "Inverter PV Power"
      unique_id: "inverter_pv_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/pv_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      force_update: true
      icon: mdi:solar-power

    - name: "Inverter PV Power Limit"
      unique_id: "inverter_pv_power_limit_mqtt"
      state_topic: "homeassistant/sensor/inverter/pv_power_limit/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      force_update: true
      icon: mdi:solar-power

    - name: "Inverter Grid Power"
      unique_id: "inverter_grid_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/grid_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      icon: mdi:transmission-tower

    - name: "Inverter Battery Power"
      unique_id: "inverter_battery_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      icon: mdi:battery-sync

    - name: "Inverter Load Power"
      unique_id: "inverter_load_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/load_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      icon: mdi:home-lightning-bolt

    - name: "Inverter Import Power"
      unique_id: "inverter_import_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/import_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      force_update: true
      icon: mdi:transmission-tower-import

    - name: "Inverter Export Power"
      unique_id: "inverter_export_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/export_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      force_update: true
      icon: mdi:transmission-tower-export

    - name: "Inverter Battery Charging Power"
      unique_id: "inverter_battery_charging_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_charging_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      force_update: true
      icon: mdi:battery-charging

    - name: "Inverter Battery Discharging Power"
      unique_id: "inverter_battery_discharging_power_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_discharging_power/state"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      force_update: true
      icon: mdi:battery-minus

    # Battery Sensors
    - name: "Inverter Battery Level"
      unique_id: "inverter_battery_level_mqtt"
      state_topic: "homeassistant/sensor/inverter/battery_level/state"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      icon: mdi:battery

    - name: "Inverter Current Min SoC"
      unique_id: "inverter_current_min_soc_mqtt"
      state_topic: "homeassistant/sensor/inverter/current_min_soc/state"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement
      icon: mdi:battery-20

    - name: "Inverter Current Max SoC"
      unique_id: "inverter_current_max_soc_mqtt"
      state_topic: "homeassistant/sensor/inverter/current_max_soc/state"
