      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      icon: mdi:home-lightning-bolt

    # Energy Sensors (Total)
    - name: "Inverter Total Generated Energy"
      unique_id: "inverter_total_generated_energy_mqtt"
      state_topic: "homeassistant/sensor/inverter/total_generated_energy/state"
