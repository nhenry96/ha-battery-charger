      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      icon: mdi:home-lightning-bolt

    # System Information
    - name: "Inverter Model"
      unique_id: "inverter_model_mqtt"
      state_topic: "homeassistant/sensor/inverter/model/state"
      icon: mdi:information

    - name: "Inverter Serial"
      unique_id: "inverter_serial_mqtt"
      state_topic: "homeassistant/sensor/inverter/serial/state"
      icon: mdi:information

    - name: "Inverter Firmware"
      unique_id: "inverter_firmware_mqtt"
      state_topic: "homeassistant/sensor/inverter/firmware/state"
      icon: mdi:information

    - name: "Inverter EMS Mode"
      unique_id: "inverter_ems_mode_mqtt"
      state_topic: "homeassistant/sensor/inverter/ems_mode/state"
      icon: mdi:lightning-bolt

    - name: "Inverter EMS Charge Discharge"
      unique_id: "inverter_ems_charge_discharge_mqtt"
      state_topic: "homeassistant/sensor/inverter/ems_charge_discharge/state"
      icon: mdi:information

    - name: "Inverter Temperature"
      unique_id: "inverter_temperature_mqtt"
      state_topic: "homeassistant/sensor/inverter/temperature/state"
      unit_of_measurement: "°C"
      device_class: temperature
