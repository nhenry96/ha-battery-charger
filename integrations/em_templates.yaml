# === ENERGY_MANAGER_TEMPLATES_START v0.3.3 ===
template:
  - sensor:
      - name: "inverter_device_type"
        availability: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {{ not is_state('sensor.sungrow_device_type_code', 'unavailable') }}
          {% elif brand == 'sigenergy' %}
            {{ states('sensor.sigenergy_device_type_code') not in ['unavailable', 'unknown', 'none'] }}
          {% elif brand == 'fronius' %}
            {{ not is_state('sensor.fronius_inverter_model', 'unavailable') }}
          {% elif brand == 'solaredge' %}
            {{ states('sensor.solaredge_device_model') not in ['unavailable', 'unknown', 'none'] }}
          {% else %}
            false
          {% endif %}
        icon: mdi:transmission-tower-import
        device_class: enum
        state: >-
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {% set code = states('sensor.sungrow_device_type_code') | int(0) %}
            {% if code in [0x0D06, 3334] %}
              SH3K6
            {% elif code in [0x0D07, 3335] %}
              SH4K6
            {% elif code in [0x0D09, 3337] %}
              SH5K-20
            {% elif code in [0x0D03, 3331] %}
              SH5K-V13
            {% elif code in [0x0D0A, 3338] %}
              SH3K6-30
            {% elif code in [0x0D0B, 3339] %}
              SH4K6-30
            {% elif code in [0x0D0C, 3340] %}
              SH5K-30
            {% elif code in [0x0D17, 3351] %}
              SH3.RS
            {% elif code in [0x0D0D, 3341] %}
              SH3.6RS
            {% elif code in [0x0D18, 3352] %}
              SH4.0RS
            {% elif code in [0x0D0F, 3343] %}
              SH5.0RS
            {% elif code in [0x0D10, 3344] %}
              SH6.0RS
            {% elif code in [0x0D1A, 3354] %}
              SH8.0RS
            {% elif code in [0x0D1B, 3355] %}
              SH10RS
            {% elif code in [0x0E00, 3584] %}
              SH5.0RT
            {% elif code in [0x0E01, 3585] %}
              SH6.0RT
            {% elif code in [0x0E02, 3586] %}
              SH8.0RT
            {% elif code in [0x0E03, 3587] %}
              SH10RT
            {% elif code in [0x0E10, 3600] %}
              SH5.0RT-20
            {% elif code in [0x0E11, 3601] %}
              SH6.0RT-20
            {% elif code in [0x0E12, 3602] %}
              SH8.0RT-20
            {% elif code in [0x0E13, 3603] %}
              SH10RT-20
            {% elif code in [0x0E0C, 3596] %}
              SH5.0RT-V112
            {% elif code in [0x0E0D, 3597] %}
              SH6.0RT-V112
            {% elif code in [0x0E0E, 3598] %}
              SH8.0RT-V112
            {% elif code in [0x0E0F, 3599] %}
              SH10RT-V112
            {% elif code in [0x0E08, 3592] %}
              SH5.0RT-V122
            {% elif code in [0x0E09, 3593] %}
              SH6.0RT-V122
            {% elif code in [0x0E0A, 3594] %}
              SH8.0RT-V122
            {% elif code in [0x0E0B, 3595] %}
              SH10RT-V122
            {% elif code in [0x0E20, 3616] %}
              SH5T-V11
            {% elif code in [0x0E21, 3617] %}
              SH6T-V11
            {% elif code in [0x0E22, 3618] %}
              SH8T-V11
            {% elif code in [0x0E23, 3619] %}
              SH10T-V11
            {% elif code in [0x0E24, 3620] %}
              SH12T-V11
            {% elif code in [0x0E25, 3621] %}
              SH15T-V11
            {% elif code in [0x0E26, 3623] %}
              SH20T-V11
            {% elif code in [0x0E28, 3624] %}
              SH25T-V11
            {% else %}
              Unknown device code: {{ '%0x' % code }}
            {% endif %}
          {% elif brand == 'sigenergy' %}
            {{ states('sensor.sigenergy_device_type_code') }}
          {% elif brand == 'alphaess' %}
            Not supported
          {% elif brand == 'fronius' %}
            {{ states('sensor.fronius_inverter_model') }}
          {% elif brand == 'solaredge' %}
            {{ states('sensor.solaredge_device_model') }}
          {% else %}
            Unknown brand
          {% endif %}
      - name: "inverter_ems_mode_text"
        unique_id: inverter_ems_mode_text
        availability: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {{ not is_state('sensor.sungrow_ems_mode', 'unavailable') }}
          {% elif brand == 'sigenergy' %}
            {{ not is_state('sensor.sigenergy_ems_mode', 'unavailable') }}
          {% elif brand == 'alphaess' %}
            {{ not is_state('sensor.alphaess_system_mode', 'unavailable') }}
          {% elif brand.startswith('goodwe') %}
            {{ 
              states('sensor.goodwe_on_grid_mode') not in ['unknown', 'unavailable']
              or
              states('sensor.on_grid_mode') not in ['unknown', 'unavailable']
            }}
          {% elif brand == 'fronius' %}
            {{ not is_state('sensor.fronius_system_state', 'unavailable') }}
          {% elif brand == 'solaredge' %}
            {{ not is_state('sensor.solaredge_storage_control_mode', 'unavailable') }}
          {% else %}
            false
          {% endif %}
        device_class: enum
        state: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {% set mode = states('sensor.sungrow_ems_mode') | int(default=0) %}
            {% if mode == 0 %}
              Self-Consumption mode
            {% elif mode == 2 %}
              Forced Mode
            {% elif mode == 3 %}
              External EMS
            {% elif mode == 4 %}
              VPP
            {% else %}
              Debug: {{ mode }}
            {% endif %}
          {% elif brand == 'sigenergy' %}
            {% set mode = states('sensor.sigenergy_ems_mode') | int(default=0) %}
            {% if mode == 0 %}
              Self-Consumption mode
            {% elif mode == 1 %}
              AI Mode
            {% elif mode == 2 %}
              TOU
            {% elif mode == 5 %}
              Fully Feed-in to Grid
            {% elif mode == 7 %}
              Remote EMS mode
            {% elif mode == 9 %}
              Custom Mode
            {% else %}
              Debug: {{ mode }}
            {% endif %}
          {% elif brand == 'alphaess' %}
            {% set mode = states('sensor.alphaess_system_mode') | int(default=0) %}
            {% if mode == 1 %}
              AC Mode
            {% elif mode == 2 %}
              DC Mode
            {% elif mode == 3 %}
              Hybrid Mode
            {% else %}
              Debug: {{ mode }}
            {% endif %}
          {% elif brand.startswith('goodwe') %}
            {{
              states('sensor.goodwe_on_grid_mode')
              if states('sensor.goodwe_on_grid_mode') not in ['unknown','unavailable']
              else states('sensor.on_grid_mode')
            }}
          {% elif brand == 'fronius' %}
            {% set mode = states('sensor.fronius_system_state') | int(default=0) %}
            {% if mode == 1 %}
              Off
            {% elif mode == 2 %}
              Empty
            {% elif mode == 3 %}
              Discharging
            {% elif mode == 4 %}
              Charging
            {% elif mode == 5 %}
              Full
            {% elif mode == 6 %}
              Holding
            {% elif mode == 7 %}
              Testing
            {% else %}
              Debug: {{ mode }}
            {% endif %}
          {% elif brand == 'solaredge' %}
            {% set mode = states('sensor.solaredge_storage_control_mode') | int(default=0) %}
            {% if mode == 0%}
              Off
            {% elif mode == 1 %}
              Charge from excess PV
            {% elif mode == 2 %}
              Charge from PV then export
            {% elif mode == 3 %}
              charge from PV then import
            {% elif mode == 4 %}
              Maximise export
            {% elif mode == 5 %}
              Discharge to load only
            {% elif mode == 7 %}
              Self-consumption
            {% else %}
              Debug: {{ mode }}
            {% endif %}
          {% else %}
            Unknown
          {% endif %}
      - name: "inverter_running_state"
        unique_id: inverter_running_state
        device_class: enum
        availability: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {{ not is_state('sensor.sungrow_inverter_start_stop_state', 'unavailable') }}
          {% elif brand == 'sigenergy' %}
            {{ not is_state('sensor.sigenergy_running_state', 'unavailable') }}
          {% elif brand == 'alphaess' %}
            {{ not is_state('sensor.alphaess_inverter_work_mode', 'unavailable') }}
          {% elif brand.startswith('goodwe') %}
            {{ 
              states('sensor.goodwe_on_grid_mode') not in 'unavailable'
              or
              states('sensor.on_grid_mode') not in 'unavailable'
            }}
          {% elif brand == 'fronius' %}
            {{ not is_state('sensor.fronius_inverter_work_mode', 'unavailable') }}
          {% elif brand == 'solaredge' %}
            {{ not is_state('sensor.solaredge_inverter_status', 'unavailable') }}
          {% else %}
            false
          {% endif %}
        state: >-
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {% set state_code = states('sensor.sungrow_inverter_start_stop_state') | int(default=0) %}
            {% if state_code == 0x0002 %}
              Stop
            {% elif state_code == 0x0008 %}
              Standby
            {% elif state_code == 0x0010 %}
              Initial Standby
            {% elif state_code == 0x0020 %}
              Startup
            {% elif state_code in [0x0000,0x0040, 207] %}
              Running
            {% elif state_code == 0x0100 %}
              Fault
            {% elif state_code == 0x0400 %}
              Maintain mode
            {% elif state_code == 0x0800 %}
              Forced mode
            {% elif state_code == 0x1000 %}
              Off-grid mode
            {% elif state_code == 0x2501 %}
              Restarting
            {% elif state_code == 0x4000 %}
              External EMS mode
            {% else %}
              Unknown
            {% endif %}
          {% elif brand == 'sigenergy' %}
            {% set state_code = states('sensor.sigenergy_running_state') | int(default=0) %}
            {% if state_code == 0x00 %}
              Standby
            {% elif state_code == 0x01 %}
              Running
            {% elif state_code == 0x02 %}
              Fault
            {% elif state_code == 0x03 %}
              Shutdown
            {% else %}
              Unknown: {{ state_code }}
            {% endif %}
          {% elif brand == 'alphaess' %}
            {% set state_code = states('sensor.alphaess_inverter_work_mode') | int(default=0) %}
            {% if state_code == 0 %}
              Wait Mode
            {% elif state_code == 1 %}
              Online Mode
            {% elif state_code == 2 %}
              UPS Mode
            {% elif state_code == 3 %}
              Bypass Mode
            {% elif state_code == 4 %}
              Fault Mode
            {% elif state_code == 5 %}
              DC Mode
            {% else %}
              Unknown: {{ state_code }}
            {% endif %}
          {% elif brand.startswith('goodwe') %}
            {{
              states('sensor.goodwe_on_grid_mode')
              if states('sensor.goodwe_on_grid_mode') not in ['unknown','unavailable']
              else states('sensor.on_grid_mode')
            }}
          {% elif brand == 'fronius' %}
            {% set state_code = states('sensor.fronius_inverter_work_mode') | int(default=0) %}
            {% if state_code == 1 %}
              Off
            {% elif state_code == 2 %}
              Sleeping
            {% elif state_code == 3 %}
              Starting
            {% elif state_code == 4 %}
              Running
            {% elif state_code == 5 %}
              Throttled
            {% elif state_code == 6 %}
              Shutting down
            {% elif state_code == 7 %}
              Fault
            {% elif state_code == 8 %}
              Standby
            {% else %}
              Unknown: {{ state_code }}
            {% endif %}
          {% elif brand == 'solaredge' %}
            {% set state_code = states('sensor.solaredge_inverter_status') | int(default=0) %}
            {% if state_code == 1 %}
              Off
            {% elif state_code == 2 %}
              Sleeping
            {% elif state_code == 3 %}
              Starting
            {% elif state_code == 4 %}
              Running
            {% elif state_code == 5 %}
              Throttled/Curtailed
            {% elif state_code == 6 %}
              Shutting down
            {% elif state_code == 7 %}
              Fault
            {% elif state_code == 8 %}
              Standby
            {% else %}
              Unknown: {{ state_code }}
            {% endif %}
          {% else %}
            Unknown
          {% endif %}
      - name: "Configuration Status"
        unique_id: config_status
        state: >
          {% set brand = states('input_select.inverter_brand') %}
          {% set restart_needed = is_state('input_boolean.restart_required', 'on') %}
          {% if restart_needed %}
            {{ brand }} selected - Restart required
          {% else %}
            {{ brand }} active
          {% endif %}
        attributes:
          selected_brand: "{{ states('input_select.inverter_brand') }}"
          restart_required: "{{ states('input_boolean.restart_required') }}"
          sungrow_active: >
            {{ is_state('input_select.inverter_brand', 'sungrow') and
                is_state('input_boolean.restart_required', 'off') }}
          sigenergy_active: >
            {{ is_state('input_select.inverter_brand', 'sigenergy') and
                is_state('input_boolean.restart_required', 'off') }}
          alphaess_active: >
            {{ is_state('input_select.inverter_brand', 'alphaess') and
                is_state('input_boolean.restart_required', 'off') }}
          goodwe_active: >
            {{ is_state('input_select.inverter_brand', 'goodwe') and
                is_state('input_boolean.restart_required', 'off') }}
          goodwe_et_active: >
            {{ is_state('input_select.inverter_brand', 'goodwe_et') and
                is_state('input_boolean.restart_required', 'off') }}
          fronius_active: >
            {{ is_state('input_select.inverter_brand', 'fronius') and
                is_state('input_boolean.restart_required', 'off') }}
          solaredge_active: >
            {{ is_state('input_select.inverter_brand', 'solaredge') and
                is_state('input_boolean.restart_required', 'off') }}
        icon: >
          {% if is_state('input_boolean.restart_required', 'on') %}
            mdi:restart-alert
          {% else %}
            mdi:check-circle
          {% endif %}
      - name: "inverter_forced_charge_command"
        unique_id: inverter_forced_charge_command
        availability: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {{ not is_state('sensor.sungrow_charge_discharge_command', 'unavailable') }}
          {% elif brand == 'sigenergy' %}
            {{ not is_state('sensor.sigenergy_remote_ems_control_mode', 'unavailable') }}
          {% elif brand == 'alphaess' %}
            {{ not is_state('sensor.alphaess_dispatch_start', 'unavailable') }}
          {% elif brand.startswith('goodwe') %}
            {{ 
              states('sensor.goodwe_operation_mode_code') not in ['unknown', 'unavailable']
              or
              states('sensor.operation_mode_code') not in ['unknown', 'unavailable']
            }}
          {% elif brand == 'fronius' %}
            {{ not is_state('sensor.fronius_ems_mode', 'unavailable')}}
          {% elif brand == 'solaredge' %}
            {{ not is_state('sensor.solaredge_ems_mode', 'unavailable') }}
          {% endif %}
        device_class: enum
        state: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {% set state = states('sensor.sungrow_charge_discharge_command') | int(default=0) %}
            {% if state == 170 %}
              Forced charge
            {% elif state == 187 %}
              Forced discharge
            {% elif state == 204 %}
              Stop (default)
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% elif brand == 'sigenergy' %}
            {% set state = states('sensor.sigenergy_remote_ems_control_mode') | int(default=2) %}
            {% if state == 4 %}
              Forced charge
            {% elif state == 5 %}
              Forced discharge
            {% elif state == 1 %}
              Standby
            {% elif state == 2 %}
              Self-consumption
            {% elif state == 0 %}
              PCS remote control
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% elif brand == 'alphaess' %}
            {% set dispatch_active = states('sensor.alphaess_dispatch_start') | int(default=0) %}
            {% if dispatch_active == 1 %}
              Available
            {% else %}
              Disabled
            {% endif %}
          {% elif brand.startswith('goodwe') %}
            {% set state =
                (states('sensor.goodwe_operation_mode_code')
                if states('sensor.goodwe_operation_mode_code') not in ['unknown', 'unavailable']
                else states('sensor.operation_mode_code'))
                | int(0)
            %}
            {% if state == 0 %}
              Self-consumption
            {% elif state == 1 %}
              Forced charge
            {% elif state == 2 %}
              Off-grid
            {% elif state == 3 %}
              Backup mode
            {% elif state == 4 %}
              Economic mode
            {% elif state == 5 %}
              Peakshaving
            {% elif state == 6 %}
              Advanced Self-use
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% elif brand == 'fronius' %}
            {% set state = states('sensor.fronius_ems_mode') | int(default=0) %}
            {% if state == 1 %}
              Forced charge
            {% elif state == 2 %}
              Forced discharge
            {% elif state == 3 %}
              External EMS control
            {% elif state == 0 %}
              Stop (default)
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% elif brand == 'solaredge' %}
            {% set state = states('sensor.solaredge_storage_control_mode') | int(default=2) %}
            {% if state == 0 %}
              Off
            {% elif state == 1 %}
              Standby
            {% elif state == 2 %}
              Init
            {% elif state == 3 %}
              Charge
            {% elif state == 4 %}
              Discharge
            {% elif state == 5 %}
              Fault
            {% elif state == 7 %}
              Idle
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% else %}
            Unknown
          {% endif %}
        icon: mdi:battery-charging
      - name: "sungrow_export_power_limit_enabled_text"
        unique_id: sungrow_export_power_limit_enabled_text
        availability: "{{ not is_state('sensor.sungrow_export_power_limit_enabled', 'unavailable') }}"
        state: >
          {% set state = states('sensor.sungrow_export_power_limit_enabled') | int(default=0) %}
          {% if state == 170 %}
            true
          {% elif state == 85 %}
            false
          {% else %}
            Debug: {{ state }}
          {% endif %}
      - name: "sigenergy_remote_ems"
        unique_id: sigenergy_remote_ems
        availability: "{{ states('sensor.sigenergy_remote_ems_code') not in ['unavailable', 'unknown'] }}"
        state: >-
          {% if ((states('sensor.sigenergy_remote_ems_code') |int) == 0) %}
            Disabled (default, uses the app)
          {% elif ((states('sensor.sigenergy_remote_ems_code') |int) == 1) %}
            Enabled (Home Assistant control)
          {% else %}
            Unknown
          {% endif %}
        icon: mdi:remote
      - name: "sigenergy_start_stop_status"
        unique_id: sigenergy_start_stop_status
        availability: "{{ not is_state('sensor.sigenergy_start_stop_code', 'unavailable') }}"
        state: >-
          {% set code = states('sensor.sigenergy_start_stop_code') | int(default=-1) %}
          {% if code == 0 %}
            Stop
          {% elif code == 1 %}
            Start
          {% else %}
            Unknown
          {% endif %}
        icon: mdi:power
      - name: "inverter_export_power_limit_enabled_text"
        unique_id: inverter_export_power_limit_enabled_text
        availability: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {{ not is_state('sensor.sungrow_export_power_limit_enabled', 'unavailable') }}
          {% elif brand == 'sigenergy' %}
            {{ not is_state('sensor.sigenergy_export_power_limit', 'unavailable') }}
          {% elif brand == 'alphaess' %}
            {{ not is_state('sensor.alphaess_max_feed_into_grid_percent', 'unavailable') }}
          {% elif brand.startswith('goodwe') %}
            {{ not is_state('switch.goodwe_grid_export_limit_switch', 'unavailable') }}
          {% elif brand == 'fronius' %}
            {{ not is_state('sensor.fronius_power_limit_enabled', 'unavailable') }}
          {% else %}
            false
          {% endif %}
        state: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sungrow' %}
            {% set state = states('sensor.sungrow_export_power_limit_enabled') | int(default=0) %}
            {% if state == 170 %}
              true
            {% elif state == 85 %}
              false
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% elif brand == 'sigenergy' %}
            {% set limit = states('sensor.sigenergy_export_power_limit') | float(0) %}
            {% if limit > 0 %}
              true
            {% else %}
              false
            {% endif %}
          {% elif brand == 'alphaess' %}
            {% set limit = states('sensor.alphaess_max_feed_into_grid_percent') | float(0) %}
            {% if limit > 0 %}
              true
            {% else %}
              false
            {% endif %}
          {% elif brand.startswith('goodwe') %}
            {{ states('switch.goodwe_grid_export_limit_switch') }}
          {% elif brand == 'fronius' %}
            {% set state = states('sensor.fronius_export_power_limit_enabled') | int(default=0) %}
            {% if state == 1 %}
              true
            {% elif state == 0 %}
              false
            {% else %}
              Debug: {{ state }}
            {% endif %}
          {% elif brand == 'solaredge' %}
            true
          {% else %}
            false
          {% endif %}
      - name: "Energy Manager Update Status"
        unique_id: energy_manager_update_status_display
        state: >
          {% if states('input_boolean.energy_manager_update_available') == 'on' %}
            Update Available
          {% else %}
            Up to Date
          {% endif %}
        icon: >
          {% if states('input_boolean.energy_manager_update_available') == 'on' %}
            mdi:update
          {% else %}
            mdi:check-circle
          {% endif %}
      - name: "Energy Manager Available Version Display"
        unique_id: energy_manager_available_version_display
        state: >
          {% if states('input_boolean.energy_manager_update_available') == 'on' %}
            {{ states('input_text.energy_manager_available_version') }}
          {% else %}
            Up to date
          {% endif %}
        icon: mdi:update
      - name: "Sungrow Battery Charging"
        unique_id: sungrow_battery_charging
        state: "{{ (states('sensor.sungrow_power_flow_status') | int(0) | bitwise_and(2)) > 0 }}"
      - name: "Sungrow Battery Discharging"
        unique_id: sungrow_battery_discharging
        state: "{{ (states('sensor.sungrow_power_flow_status') | int(0) | bitwise_and(4)) > 0 }}"
      - name: sungrow_current_export_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set export = states('sensor.sungrow_battery_export_power_raw') | float(0) %}
          {% if export > 0 %}
            {{ export }}
          {% else %}
            0
          {% endif %}
        availability: >
          {{ states('sensor.sungrow_battery_export_power_raw') not in ['unknown', 'unavailable'] }}
      - name: sungrow_current_import_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set import = (states('sensor.sungrow_battery_export_power_raw') | float(0) * -1) %}
          {% if import > 0 %}
            {{ import }}
          {% else %}
            0
          {% endif %}
        availability: >
          {{ states('sensor.sungrow_battery_export_power_raw') not in ['unknown', 'unavailable'] }}
      - name: battery_cycles_per_day
        unit_of_measurement: "C/d"
        state_class: measurement
        state: >
          {% set charge = states("sensor.total_battery_charge") | float(0) %}
          {% set age = states("sensor.battery_age_days") | float(1) %}
          {% set capacity = states("input_number.battery_capacity") | float(19.2) %}
          {% if charge > 0 and age > 0 and capacity > 0 %}
            {{ (charge / age / capacity) | round(4) }}
          {% else %}
            0
          {% endif %}
        icon: mdi:battery
      - name: "current_hour_plus_01"
        state: >
          {% set h = states('input_number.current_hour') | int(0) %}
          {{ (h + 1) % 24 }}
      - name: "current_hour_plus_02"
        state: >
          {% set h = states('input_number.current_hour') | int(0) %}
          {{ (h + 2) % 24 }}
      - name: "current_hour_plus_03"
        state: >
          {% set h = states('input_number.current_hour') | int(0) %}
          {{ (h + 3) % 24 }}
      - name: "current_hour_plus_04"
        state: >
          {% set h = states('input_number.current_hour') | int(0) %}
          {{ (h + 4) % 24 }}
      - name: "current_hour_plus_05"
        state: >
