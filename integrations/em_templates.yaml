          {% if states('sensor.goodwe_battery_mode') not in ['unknown','unavailable'] %}
            {{ states('sensor.goodwe_battery_mode') }}
          {% else %}
            {{ states('sensor.battery_mode') }}
          {% endif %}
      - name: "Battery Calculation Engine"
        unique_id: battery_calculation_engine
        state: >
          {% set battery_power = states('sensor.inverter_battery_power') | float(0) %}
          {% set charging_power = states('sensor.inverter_battery_charging_power') | float(0) %}
          {% set discharging_power = states('sensor.inverter_battery_discharging_power') | float(0) %}

          {% if battery_power | abs <= 10 %}
            idle
          {% elif charging_power > 10 %}
            charging
          {% elif discharging_power > 10 %}
            discharging
          {% else %}
            idle
          {% endif %}
        attributes:
          completion_time: >
            {% set current_soc = states('sensor.inverter_battery_level') | float(0) %}
            {% set battery_capacity = states('sensor.inverter_battery_capacity') | float(0) %}
            {% set battery_power = states('sensor.inverter_battery_power') | float(0) %}
            {% set charging_power = states('sensor.inverter_battery_charging_power') | float(0) %}
            {% set discharging_power = states('sensor.inverter_battery_discharging_power') | float(0) %}
            {% set brand = states('input_select.inverter_brand') | lower %}
            {% if brand in ['sungrow', 'sigenergy'] %}
              {% set max_soc = states('sensor.inverter_current_max_soc') | float(100) %}
              {% set reserved_soc = states('sensor.inverter_current_reserved_soc_backup') | float(0) %}
              {% set min_soc = states('sensor.inverter_current_min_soc') | float(0) %}
            {% else %}
              {% set max_soc = 100 %}
              {% set reserved_soc = 0 %}
              {% set min_soc = 0 %}
            {% endif %}
            {% if battery_power | abs <= 10 %}
              none
            {% elif charging_power > 10 %}
              {% set remaining_soc = max_soc - current_soc %}
              {% set remaining_kwh = remaining_soc / 100 * battery_capacity %}
              {% if remaining_kwh <= 0 %}
                none
              {% else %}
                {% set hours = remaining_kwh / (charging_power / 1000) %}
                {{ (now() + timedelta(hours=hours)).isoformat() }}
              {% endif %}
            {% elif discharging_power > 10 %}
              {% if brand in ['sungrow', 'sigenergy'] %}
                {% set soc_to_reserved = current_soc - reserved_soc %}
                {% if soc_to_reserved > 0 %}
                  {% set kwh_to_reserved = soc_to_reserved / 100 * battery_capacity %}
                  {% set hours = kwh_to_reserved / (discharging_power / 1000) %}
                  {{ (now() + timedelta(hours=hours)).isoformat() }}
                {% else %}
                  {% set soc_to_min = current_soc - min_soc %}
                  {% if soc_to_min > 0 %}
                    {% set kwh_to_min = soc_to_min / 100 * battery_capacity %}
                    {% set hours = kwh_to_min / (discharging_power / 1000) %}
                    {{ (now() + timedelta(hours=hours)).isoformat() }}
                  {% else %}
                    none
                  {% endif %}
                {% endif %}
              {% else %}
                {% set remaining_kwh = current_soc/100 * battery_capacity %}
                {% set hours = remaining_kwh / (discharging_power / 1000) %}
                {{ (now() + timedelta(hours=hours)).isoformat() }}
              {% endif %}
            {% else %}
              none
            {% endif %}          
          hours_total: >
            {% set current_soc = states('sensor.inverter_battery_level') | float(0) %}
            {% set battery_capacity = states('sensor.inverter_battery_capacity') | float(0) %}
            {% set battery_power = states('sensor.inverter_battery_power') | float(0) %}
            {% set charging_power = states('sensor.inverter_battery_charging_power') | float(0) %}
            {% set discharging_power = states('sensor.inverter_battery_discharging_power') | float(0) %}
            {% set brand = states('input_select.inverter_brand') | lower %}           
            {% if brand in ['sungrow', 'sigenergy'] %}
              {% set max_soc = states('sensor.inverter_current_max_soc') | float(100) %}
              {% set reserved_soc = states('sensor.inverter_current_reserved_soc_backup') | float(0) %}
              {% set min_soc = states('sensor.inverter_current_min_soc') | float(0) %}
            {% else %}
              {% set max_soc = 100 %}
              {% set reserved_soc = 0 %}
              {% set min_soc = 0 %}
            {% endif %}         
            {% if battery_power | abs <= 10 %}
              0
            {% elif charging_power > 10 %}
              {% set remaining_soc = max_soc - current_soc %}
              {% set remaining_kwh = remaining_soc / 100 * battery_capacity %}
              {% if remaining_kwh <= 0 %}
                0
              {% else %}
                {{ remaining_kwh / (charging_power / 1000) }}
              {% endif %}
            {% elif discharging_power > 10 %}
              {% if brand in ['sungrow', 'sigenergy'] %}
                {% set soc_to_reserved = current_soc - reserved_soc %}
                {% if soc_to_reserved > 0 %}
                  {% set kwh_to_reserved = soc_to_reserved / 100 * battery_capacity %}
                  {{ kwh_to_reserved / (discharging_power / 1000) }}
                {% else %}
                  {% set soc_to_min = current_soc - min_soc %}
                  {% if soc_to_min > 0 %}
                    {% set kwh_to_min = soc_to_min / 100 * battery_capacity %}
                    {{ kwh_to_min / (discharging_power / 1000) }}
                  {% else %}
                    0
                  {% endif %}
                {% endif %}
              {% else %}
                {% set remaining_kwh = current_soc/100 * battery_capacity %}
                {{ remaining_kwh / (discharging_power / 1000) }}
              {% endif %}
            {% else %}
              0
            {% endif %}        
          target_soc: >
            {% set current_soc = states('sensor.inverter_battery_level') | float(0) %}
            {% set battery_power = states('sensor.inverter_battery_power') | float(0) %}
            {% set charging_power = states('sensor.inverter_battery_charging_power') | float(0) %}
            {% set discharging_power = states('sensor.inverter_battery_discharging_power') | float(0) %}
            {% set brand = states('input_select.inverter_brand') | lower %}          
            {% if brand in ['sungrow', 'sigenergy'] %}
              {% set max_soc = states('sensor.inverter_current_max_soc') | float(100) %}
              {% set reserved_soc = states('sensor.inverter_current_reserved_soc_backup') | float(0) %}
              {% set min_soc = states('sensor.inverter_current_min_soc') | float(0) %}
            {% else %}
              {% set max_soc = 100 %}
              {% set reserved_soc = 0 %}
              {% set min_soc = 0 %}
            {% endif %}          
            {% if battery_power | abs <= 10 %}
              {{ current_soc }}
            {% elif charging_power > 10 %}
              {{ max_soc }}
            {% elif discharging_power > 10 %}
              {% if brand in ['sungrow', 'sigenergy'] %}
                {% set soc_to_reserved = current_soc - reserved_soc %}
                {% if soc_to_reserved > 0 %}
                  {{ reserved_soc }}
                {% else %}
                  {% set soc_to_min = current_soc - min_soc %}
                  {% if soc_to_min > 0 %}
                    {{ min_soc }}
                  {% else %}
                    {{ current_soc }}
                  {% endif %}
                {% endif %}
              {% else %}
                0
              {% endif %}
            {% else %}
              {{ current_soc }}
            {% endif %}
      - name: >
          {% set calc = states('sensor.battery_calculation_engine') %}
          {% set target_soc = state_attr('sensor.battery_calculation_engine', 'target_soc') | int(0) %}
          {% if calc == 'charging' %}
            Battery Runtime (to {{ target_soc }}% SoC)
          {% elif calc == 'discharging' %}
            {% if target_soc > 0 %}
              Battery Runtime (to {{ target_soc }}% SoC)
            {% else %}
              Battery Runtime (to empty)
            {% endif %}
          {% else %}
            Battery Runtime
          {% endif %}
        unique_id: battery_hours_remaining
        state: >
          {% set calc = states('sensor.battery_calculation_engine') %}
          {% set hours = state_attr('sensor.battery_calculation_engine', 'hours_total') | float(0) %}
          {% if calc == 'idle' %}
            Idle
          {% elif calc == 'charging' or calc == 'discharging' %}
            {% set h = (hours // 1) | int %}
            {% set m = ((hours % 1) * 60) | round(0) | int %}
            {% if h == 0 %}
              {{ m }}m
            {% else %}
              {{ h }}h {{ m }}m
            {% endif %}
          {% else %}
            Idle
          {% endif %}
        icon: >
          {% set calc = states('sensor.battery_calculation_engine') %}
          {% if calc == 'idle' %}
            mdi:battery
          {% elif calc == 'charging' %}
            mdi:battery-charging
          {% else %}
            mdi:battery-arrow-down
          {% endif %}
      - name: >
          {% set calc = states('sensor.battery_calculation_engine') %}
          {% set target_soc = state_attr('sensor.battery_calculation_engine', 'target_soc') | int(0) %}
          {% set brand = states('input_select.inverter_brand') | lower %}
          {% if calc == 'charging' %}
            Battery Charged (to {{ target_soc }}% SoC)
          {% elif calc == 'discharging' %}
            {% if target_soc > 0 %}
              Battery Discharged (to {{ target_soc }}% SoC)
            {% else %}
              {% if brand in ['sungrow', 'sigenergy'] %}
                Battery Discharged (to empty)
              {% else %}
                Battery Empty Time
              {% endif %}
            {% endif %}
          {% else %}
            Battery State
          {% endif %}
        unique_id: battery_completion_time
        icon: mdi:clock-outline
        state: >
          {% set calc = states('sensor.battery_calculation_engine') %}
          {% set completion = state_attr('sensor.battery_calculation_engine', 'completion_time') %}
          {% if calc == 'idle' %}
            Idle
          {% elif completion and completion != 'none' %}
            {% set target = completion | as_datetime | as_local %}
            {% set clock = (target.strftime('%I:%M%p')).lstrip('0').lower() %}
            {% set dow = target.strftime('%A') %}
            {{ clock }} {{ dow }}
          {% else %}
            Idle
          {% endif %}
