  - select:
      - name: "inverter_charge_discharge_mode_select"
        unique_id: inverter_charge_discharge_mode_select
        state: >
          {% set brand = states('input_select.inverter_brand') %}
          {% if brand == 'sigenergy' %}
            {% set state = states('sensor.sigenergy_remote_ems_control_mode') | int(default=2) %}
            {% if state == 0 %}Remote Control
            {% elif state == 1 %}Standby
            {% elif state == 2 %}Self Consumption
            {% elif state == 3 %}Force Charge
            {% elif state == 4 %}Force Charge
            {% elif state == 5 %}Force Discharge
            {% elif state == 6 %}Force Discharge
            {% else %}Unknown
            {% endif %}
          {% elif brand == 'sungrow' %}
            {% set ems_mode = states('sensor.sungrow_ems_mode') | int(default=0) %}
            {% set charge_discharge_cmd = states('sensor.sungrow_charge_discharge_command') | int(default=204) %}
            {% if ems_mode == 0 %}
              {% if charge_discharge_cmd == 170 %}Force Charge
              {% elif charge_discharge_cmd == 187 %}Force Discharge
              {% else %}Self Consumption
              {% endif %}
            {% elif ems_mode == 2 %}
              {% if charge_discharge_cmd == 170 %}Force Charge
              {% elif charge_discharge_cmd == 187 %}Force Discharge
              {% else %}Standby
              {% endif %}
            {% elif ems_mode == 3 %}External EMS
            {% elif ems_mode == 4 %}VPP
            {% else %}Unknown ({{ ems_mode }})
            {% endif %}
          {% elif brand == 'alphaess' %}
            {% set dispatch_active = states('sensor.alphaess_dispatch_start') | int(default=0) %}
            {% set dispatch_power = states('sensor.alphaess_dispatch_active_power') | int(default=32000) %}
            {% set dispatch_mode = states('sensor.alphaess_dispatch_mode') | int(default=5) %}
            {% if dispatch_active == 0 %}
              Self Consumption
            {% elif dispatch_active == 1 %}
              {% if dispatch_power < 32000 %}Force Charge
              {% elif dispatch_power > 32000 %}Force Discharge
              {% else %}Standby
              {% endif %}
            {% else %}
              Unknown
            {% endif %}
          {% elif brand.startswith('goodwe') %}
            {% set state = states('select.goodwe_inverter_operation_mode') %}
            {% if state == 'Eco mode' %}Stop
            {% elif state == 'Eco charge mode' %}Forced Charge
            {% elif state == 'Eco discharge mode' %}Forced Discharge
            {% else %}Unknown
            {% endif %}
          {% elif brand == 'fronius' %}
            {% set storage_mode = states('sensor.fronius_ems_mode') | int(default=0) %}
            {% if storage_mode == 0 %}Self Consumption
            {% elif storage_mode == 1 %}Force Charge
            {% elif storage_mode == 2 %}Force Discharge
            {% else %}Unknown ({{ storage_mode }})
            {% endif %}
          {% elif brand == 'solaredge' %}
            {% set state = states('sensor.solaredge_ems_mode') | int(default=2) %}
            {% if state == 0 %}Off
            {% elif state == 1 %}Standby
            {% elif state == 2 %}Init
            {% elif state == 3 %}Force Charge
            {% elif state == 4 %}Force Discharge
            {% elif state == 5 %}Fault
            {% elif state == 7 %}idle
            {% else %}Unknown
            {% endif %}
          {% else %}
            Unknown brand
          {% endif %}
        options: >
          {{ [
            "Self Consumption",
            "Force Charge",
            "Force Discharge",
            "Standby",
            "Remote Control",
            "External EMS",
            "VPP"
          ] }}
        select_option:
          - service: script.set_inverter_charge_discharge_mode
            data:
              option: "{{ option }}"
