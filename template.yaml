# === ENERGY_MANAGER_TEMPLATES_START v0.2.5 ===
# Moved to packages (integrations/em_templates.yaml)

- sensor:
    - name: "Additional PV Power"
      unique_id: em_additional_pv_power_total
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      state: >
        {% set p1 = states('sensor.goodwe_pv_power') | float(0) %}
        {% set p2 = states('sensor.SECONDARY_PV_POWER_2') | float(0) %}
        {% set p3 = states('sensor.SECONDARY_PV_POWER_3') | float(0) %}
        {{ (p1 + p2 + p3) | round(0) }}

# === ENERGY_MANAGER_TEMPLATES_END ===

