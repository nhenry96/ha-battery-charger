    max_columns: 2
    cards: []
    dense_section_placement: false
  - type: sections
    max_columns: 2
    icon: mdi:update
    path: ""
    sections:
      - type: grid
        cards:
          - type: markdown
            content: >-
              # Energy Manager Updates

          - type: entities
            entities:
              - entity: sensor.energy_manager_update_status
                name: Update Status
              - entity: sensor.energy_manager_current_version
                name: Current Version
              - entity: sensor.energy_manager_available_version_display
                name: Available Version
              - entity: input_datetime.energy_manager_last_update_check
                name: Last Check
              - entity: input_boolean.energy_manager_auto_update_check
                name: Auto-Check Updates

          - type: conditional
            conditions:
              - entity: binary_sensor.ssh_key_exists
                state: "off"
            card:
              type: button
              tap_action:
                action: call-service
                service: automation.trigger
                target:
                  entity_id: automation.generate_ssh_key_shell
              name: Generate SSH Key
              icon: mdi:key-plus
              show_name: true
              show_icon: true

          - type: conditional
            conditions:
              - entity: input_text.ssh_key_status
                state: "success"
              - entity: input_text.ssh_key_dismissed
                state_not: "true"
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    ## 🔑 SSH Key Generated!

                    **Add to SSH Addon:**
                    1. Go to Settings → Add-ons → Advanced SSH & Web Terminal
                    2. Click Configuration tab
                    3. Add this to authorized_keys:

                    ```yaml
                    authorized_keys:
                      - "{{ states('input_text.ssh_public_key') }}"
                    ```
                    Then:
                    4. Save and restart SSH addon
                    5. Done! Energy Manager updates will now work.

                - type: button
                  tap_action:
                    action: call-service
                    service: input_text.set_value
                    target:
                      entity_id: input_text.ssh_key_dismissed
                    service_data:
                      value: "true"
                  name: "✓ Done - Hide This Message"
                  icon: mdi:check

          - show_name: true
            show_icon: true
            type: button
            entity: script.check_for_energy_manager_updates
            name: Check Updates
            icon: mdi:update
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.check_for_energy_manager_updates
          - show_name: true
            show_icon: true
            type: button
            entity: script.update_energy_manager
            name: Install Update
            icon: mdi:download
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.update_energy_manager
          - show_name: true
            show_icon: true
            type: button
            entity: script.update_energy_manager_force
            name: Force Reinstall
            icon: mdi:download-multiple
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.update_energy_manager_force
          - type: conditional
            conditions:
              - entity: input_boolean.energy_manager_update_available
                state: "on"
            card:
              type: markdown
              content: >
                ## 🆕 Update Available!

