                **Current Version:** {{ states('sensor.energy_manager_current_version') }}

                **Last Checked:** {{ states('input_datetime.energy_manager_last_update_check') }}

                ### 📋 Updates:
                {{ states('input_text.energy_manager_changelog') }}

