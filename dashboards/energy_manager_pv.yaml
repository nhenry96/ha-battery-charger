  - type: sections
    title: Settings
    path: em-settings
    icon: mdi:cog-outline
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  # Your Energy Setup

                  Enter the details of your solar and battery setup.


                  **Battery Install Date:** Used to calculate battery
                  cycles/day.

                  **Inverter Size:** This should be the advertised inverter
                  size, in kW.

                  **Battery Charge and Discharge Power Limit:** Check your manual
                  or with your installer to find out what the maximum charge and 
                  discarge limits are for your batteries.
                  Important: Do you enter a charge or discharge limit that is higher
                  than your inverter capability.

                  **Invert Export Limit:** This will generally be what your
                  energy company (e.g. Energex) allow you to export. Normally it
                  would be 5kW, even if you have a larger inverter.

                  **Battery Capacity:** Enter the size of your battery stack, in
                  kWh.

                  **Total Solar Array Size:** Enter the total size of your solar
                  panel array(s), in kW

                  **Energy Manager API Key:** Obtain your free API Key from
                  https://energymanager.com.au

                  **Exclusion Period:** You are able to set a time period when
                  you will disable battery discharge, so that you will *only*
                  take from the grid - good for EV charging. Leave disabled
                  unless you really need it. [PREMIUM ONLY]
                text_only: true
              - type: entities
                title: System Configuration
                entities:
                  - entity: input_select.inverter_brand
                    name: Inverter Brand
                  - entity: sensor.configuration_status
                    name: Status
                  - entity: input_boolean.restart_required
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "goodwe"
                card:
                  type: entities
                  entities:
                    - entity: input_number.goodwe_schedule_8slot
                      name: GoodWe EH Slot (1-8)
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "goodwe_et"
                card:
                  type: entities
                  entities:
                    - entity: input_number.goodwe_schedule_4slot
                      name: GoodWe ET/ESA Slot (1-4)
              - type: entities
                entities:
                  - entity: input_datetime.battery_install_date
                  - entity: input_number.inverter_import_limit
                    name: Inverter Size (kW)
                  - entity: input_number.battery_charge_power_hardlimit
                    name: Battery Charge Limit (W)
                  - entity: input_number.battery_discharge_power_hardlimit
                    name: Battery Discharge Limit (W)
                  - entity: input_number.inverter_export_power_hardlimit
                    name: Export Power Limit (W)
                  - entity: input_number.battery_capacity
                    name: Battery Capacity (kWh)
                  - entity: input_number.solar_array_size
                    name: Total Solar Array Size (kW)
                  - entity: input_boolean.enable_curtailing
                    name: Enable Curtailing
                  - entity: input_text.energymanager_key
                    name: Energy Manager API Key (Required)
                  - entity: input_text.em_api_version
                    name: Energy Manager API Version
                  - entity: input_text.timezone
                    name: Timezone (e.g., AEST or AEDT) (Required)
                  - entity: input_boolean.enable_exclusion_period
                  - entity: input_boolean.energy_flow_visual
              - type: conditional
                conditions:
                  - entity: input_boolean.enable_exclusion_period
                    state: "on"
                card:
                  type: entities
                  entities:
                    - entity: input_datetime.exclusion_start_time
                    - entity: input_datetime.exclusion_end_time
              - type: conditional
                conditions:
                  - entity: input_select.electricity_provider
                    state: ["LocalVolts","Amber Electric"]
                card:
                  type: sensor
                  entity: sensor.nodered_energyproviderupdate
                  graph: none
                  detail: 1
                  name: Electricity Provider API Last Successful Poll
              - graph: none
                type: sensor
                entity: sensor.solcast_last_updated
                detail: 1
                name: Solcast API Last Successful Poll
              - graph: none
                type: sensor
                entity: sensor.em_last_updated
                detail: 1
                name: Energy Manager API Last Successful Poll
                icon: mdi:clock
              - graph: none
                type: sensor
                entity: sensor.bom_last_updated
                detail: 1
                icon: mdi:clock
                name: BOM Last Successful Poll
          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  # Electricity Provider

                  Select your Electricity Provider and enter **either** your
                  LocalVolts details **or** your  Amber Electric details below,
                  depending on who your electricity provider is.


                  **LocalVolts:** You can obtain your API Key and Partner ID by
                  emailing LocalVolts support. NMI can usually be set as "*".


                  **Amber Electric:** You can obtain your API Key from
                  https://app.amber.com.au/developers/. NMI is automatically
                  pulled during integration initialisation.


                  **Flow Power:** You do include an API key for Flow Power.


                  **Important:** You need to select an electricity provider from
                  those available. Energy Management will not work with other
                  providers.
                text_only: true
              - type: entity
                entity: input_select.electricity_provider
                state_color: false
                grid_options:
                  columns: 12
                  rows: 2
                name: Your Electricity Provider (Select)
              - type: conditional
                conditions:
                  - entity: input_select.electricity_provider
                    state: LocalVolts
                card:
                  type: entities
                  entities:
                    - entity: input_text.localvolts_partner_id
                      name: LocalVolts Partner ID (Required)
                    - entity: input_text.localvolts_key
                      name: LocalVolts API Key (Required)
                    - entity: input_text.nmi
                      name: Electricity NMI (Required, try *)
              - type: conditional
                conditions:
                  - entity: input_select.electricity_provider
                    state: Amber Electric
                card:
                  type: entities
                  entities:
                    - entity: input_text.amber_api_key
                      name: Amber Electric API Key (Required)
                    - entity: input_text.amber_site
                      name: Amber Electric Site ID (Required)
              - type: conditional
                conditions:
                  - entity: input_select.electricity_provider
                    state: Flow Power
                card:
                  type: entities
                  entities:
                    - entity: input_datetime.flowpower_peak_start_time
                      name: Peak Start Time (Required)
                    - entity: input_datetime.flowpower_peak_end_time
                      name: Peak End Time (Required)
                    - entity: input_number.flowpower_buy_price
                      name: Buy Price
                    - entity: input_number.flowpower_offpeak_feedin_price
                      name: Off-peak Feed-in Price
                    - entity: input_number.flowpower_peak_feedin_price
                      name: Peak Feed-in Price
                    - entity: input_boolean.flowpower_enable_peak_export
                      name: Allow peak exporting
                    - entity: input_number.flowpower_max_export_percent_good_weather
                      name: "Normal: Percent export rate"
                    - entity: input_boolean.flowpower_bad_weather_export
                      name: Export on bad weather
              - type: conditional
                conditions:
                  - entity: input_select.electricity_provider
                    state: "Flow Power"
                  - entity: input_boolean.flowpower_bad_weather_export
                    state: "on"
                card:
                  type: entities
                  entities:
                    - entity: input_number.flowpower_max_export_percent_bad_weather
                      name: "Bad weather: Percent export rate"
              - type: vertical-stack
                cards:
                  - type: markdown
                    content: >
                      # Electricity Distributor

                      Select your **Electricity Distributor** from the list.
                      This is used to define your demand period, should you have one.


                      **Important**: Make sure to turn on the **Enable if you are on a demand tariff**
                      if you are on a demand tariff.
                  - type: entity
                    entity: input_boolean.electricity_distributor_demand_enabled
                    name: Enable if you are on a demand tariff
                  - type: entity
                    entity: input_select.electricity_distributor
                    name: Electricity Distributor (for demand periods)
              - type: markdown
                content: >-
                  # Your Solcast Details

                  Enter the details of your **Solcast configuration** here.
                  Solcast is used  to predict the amount of solar generation
                  from your array for the day, and to predict the coming day's
                  generation.


                  Your free API key and site codes can be created and retrieved
                  from https://www.solcast.com. You will **need** at least the
                  API key and one site code for Energy Manager to work
                  correctly.
                text_only: true
              - type: entities
                entities:
                  - entity: input_text.solcast_key
                    name: Solcast API Key (Required)
                  - entity: input_text.solcast_array_1
                    name: Solcast Array 1 Code (Required)
                  - entity: input_text.solcast_array_2
                    name: Solcast Array 2 Code (Optional)

              - type: conditional
                conditions:
                  - entity: input_select.electricity_provider
                    state_not: "Flow Power"
                card:
                  type: vertical-stack
                  cards:
                    - type: markdown
                      content: >-
                        # Notifications

                        If you would like to be notified when price spikes and other
                        important events occur, please install the **NTFY** app on
                        your Android or iOS device and then subsribe to your unique
                        channel. Notifications will also appear in Home Assistant. [PREMIUM ONLY]:


                        **https://ntfy.energymanager.com.au/{{states('input_text.energymanager_key')}}**


                        Make sure to select **Use another server** and enter
                        https://ntfy.energymanager.com.au as the server name when
                        subscribing.


                        **Price Spike Notifications:** If a price spike is detected, a notification will be sent.
                        **Warning Notifications:** If a configuration issue is detected (for example, no Solcast data), a notification will be sent.
                      text_only: true
                    - type: entities
                      entities:
                        - entity: input_boolean.notification_price
                        - entity: input_boolean.notification_warning
              - type: markdown
                content: >-
                  # Emergency Override

                  The emergency override toggle will disable energy manager from running any automations (except for retrieving electricity pricing data).

                  This will disable energy manager completely until you manually re-enable it. If you turn it off, remember to turn it back on as it will not enable by itself.
                text_only: true
              - type: entities
                entities:
                  - entity: input_boolean.emergency_override
        column_span: 3
    header:
      layout: responsive
      badges_position: bottom
    max_columns: 2
    cards: []
    dense_section_placement: false
  - type: sections
    title: Score Settings
    path: em-score-settings
    icon: mdi:counter
    sections:
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  # Energy Scores

                  You are provided access to Energy Availabilty and Profit Potential scores
                  to allow you more granular control of your energy consumption. Here you are able to customise additional settings
                  that will change how your Energy Availability and Profit Potential scores will be
                  calculated.
                  
                  
                  The scores are contained in entities that you can link other automations into,
                  to allow you to defer energy using appliances/loads to periods when the most energy will be available.
                  Examples of load deferring may be EV charging, washing machines, pool pumps, hot water systems, etc.


                  Update the settings below to reflect what factors should impact your scoring system.
                  
                  
                  Entering a higher number places more emphasis, or importance, on that factor. They will all be normalised
                  at the EM servers so that the total of all factors equals 1, but will remain proportional.


                  ## What do these scores mean that these weightings are getting applied to?

                  ### Availability Scores

                  These scores rate how much energy is available for you to use now, over the next 12hrs and possibly over the next 5 days.
                  It is rated from 1-100, with 100 being the best.  It takes into account your predicted current and future solar generation, your
                  current and future household power requirements, how full your battery is (taking into consideration your
                  upcoming household requirements), and of course the cost of purchasing energy from the grid, if that becomes
                  a requirement.


                  #### How can these Availability scores be used?

                  These scores can change every 5 minutes as forecasts and prices change. Since entities are created for now, the next 12hrs, and the next
                  5 days, you can create your own automations to perform a function when a specific score is reached. For example, perhaps
                  you want to turn on a pool heat pump when there is ample spare energy, you could watch for the "now" score to change to
                  something over, for example, 60, and then turn on.  If the "now" score drops below it again, turn it off.  This way you
                  can load-shift, or defer, their power use to a time that you have more energy available, for example, while your inverter is
                  curtailing and the sun is shining.


                  The entities are known as: **input_number.ascore_now**, **input_number.ascore_1h** to **input_number.ascore_12h**, and **input_number.ascore_1d** to **input_number.ascore_5d**


                  The **input_number.ascore_now** sensor would be the most important one to watch, as that is the score right now.

                  ### Profit Potential Scores
                  
                  These scores rate how potentially profitable the current hour and the next 12hrs could be.  It is rated from 1-100 (a 
                  negative FIT will score a 1), with 100 being the best.

                  #### How can these Profit Potential scores be used?

                  Similar to the Availability scores, these change every 5 mins as pricing forecasts change. Again, since entities are created for now 
                  and the next 12hrs, you can create automations that will **stop** certain appliances during a time where there is a potential to export
                  your power. Being able to export more power during a price spike is important, as you will want to export it as quickly as possible.
                  This will depend on the ability of your battery to discharge, but if you can minimise your usage during an export favourable
                  time, then you may be able to export more of your energy to maximise your profits.


                  The entities are known as: **input_number.pscore_now** and **input_number.pscore_1h** to **input_number.pscore_12h**.


                  The **input_number.pscore_now** sensor would be the most important one to watch, as that is the score right now.
                text_only: true

          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  # Weightings

                  Enter how important you believe each factor is in defining availability. If you leave these all at zero, the defaults (in brackets)
                  will be applied until you change them.


                  **Weight Availabilty Price**: How important grid price is in determining availability (0.30).

                  **Weight Availability Solar**: Importance of available solar (0.40)

                  **Weight Availability Usage**: If load is high, availability to spare is lower. How important is this? (0.20)

                  **Weight Availability Battery**: A fuller battery means more availabilty to use/export, how important is this to you? (0.10)


                  **Weight Profit Sell Price**: Is selling for a high price important? (0.55)

                  **Weight Profit Battery Headroom**: Is having spare capacity in the battery important? (0.25)

                  **Weight Profit Night Survival**: Is making it through the night on your battery important? (0.20)
              - type: markdown
                content: >
                  ### Availability Weightings
                text_only: true
              - type: entities
                entities:
                  - entity: input_number.weight_as_price
                    name: "Buy Price Weighting"
                  - entity: input_number.weight_as_solar
                    name: "Solar Weighting"
                  - entity: input_number.weight_as_usage
                    name: "Usage Weighting"
                  - entity: input_number.weight_as_battery
                    name: "Battery weighting"
              - type: markdown
                content: >
                  ### Profit Potential Weightings
                text_only: true
              - type: entities
                entities:
                  - entity: input_number.weight_ps_sell_price
                    name: "Sell Price Weighting"
                  - entity: input_number.weight_ps_headroom
                    name: "Battery Headroom Weighting"
                  - entity: input_number.weight_ps_night_survival
                    name: "Night Survival Weighting"
