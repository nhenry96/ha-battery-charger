# energy_manager_pv.yaml v0.3.3
views:
  - type: sections
    max_columns: 3
    icon: mdi:home-lightning-bolt
    path: em-inverter
    title: Inverter
    sections:
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.emergency_override
                state: "on"
            card:
              type: markdown
              content: >
                <div>
                ⚠️ Warning: Emergency Override has been enabled. Energy Manager is disabled in this mode.
                </div>
              card_mod:
                style: |
                  ha-card {
                    background-color: #ffe6e7;
                    color: #ff000e;
                    padding: 10px 16px;
                    border-radius: 10px;
                    font-weight: bold;
                    font-size: 1.2em;
                  }
          - type: conditional
            conditions:
              - entity: binary_sensor.em_motd_unread
                state: "on"
            card:
              type: custom:layout-card
              layout_type: custom:grid-layout
              layout:
                grid-template-columns: 3fr 1fr
                grid-gap: 12px
              cards:
                - type: markdown
                  content: |
                    ## 📢Announcement available  
                    [Open information page](/energy-pv/5)
                  card_mod:
                    style: |
                      ha-card {
                        background-color: #e6fcedff;
                        color: #000000ff;
                        padding: 10px 16px;
                        border-radius: 10px;
                        font-weight: bold;
                        font-size: 1.2em;
                      }
                - type: button
                  icon: mdi:check
                  show_name: false
                  tap_action:
                    action: call-service
                    service: rest_command.em_motd_mark_read
          - type: entities
            title: System Information
            entities:
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["alphaess","goodwe","goodwe_et"]
                row:
                  entity: sensor.inverter_device_type
                  name: Model
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: ["goodwe","goodwe_et"]
                row:
                  entity: sensor.inverter_model
                  name: Model
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: "alphaess"
                row:
                  entity: sensor.inverter_serial
                  name: Serial Number
              - entity: sensor.inverter_firmware
                name: Firmware version
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["fronius","goodwe","goodwe_et"]
                row:
                  entity: sensor.inverter_running_state
                  name: Inverter Running Status
              - entity: sensor.inverter_ems_mode_text
                name: EMS Mode
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: ["goodwe","goodwe_et"]
                row:
                  entity: sensor.goodwe_battery
                  name: Battery Mode
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: "fronius"
                row:
                  entity: sensor.inverter_battery_soh
                  name: Battery SoH (%)
            state_color: true
          - type: entities
            title: System Status
            entities:
              - entity: binary_sensor.pv_generating
                name: PV Generating
                card_mod:
                  style:
                    hui-generic-entity-row:
                      $: |
                        :host {
                          {% set val = states('binary_sensor.pv_generating') %}
                          --generating-color:
                            {% if val == 'on' %}
                              orange
                            {% else %}
                              grey
                            {% endif %};
                        }
                        :host .state {color: var(--generating-color) !important; }
              - entity: binary_sensor.battery_charging
                name: Battery Charging
                card_mod:
                  style:
                    hui-generic-entity-row:
                      $: |
                        :host {
                          {% set val = states('binary_sensor.battery_charging') %}
                          --battery-charging-color:
                            {% if val == 'on' %}
                              orange
                            {% else %}
                              grey
                            {% endif %};
                        }
                        :host .state {color: var(--battery-charging-color) !important; }
              - entity: binary_sensor.battery_discharging
                name: Battery Discharging
                card_mod:
                  style:
                    hui-generic-entity-row:
                      $: |
                        :host {
                          {% set val = states('binary_sensor.battery_discharging') %}
                          --battery-discharging-color:
                            {% if val == 'on' %}
                              orange
                            {% else %}
                              grey
                            {% endif %};
                        }
                        :host .state {color: var(--battery-discharging-color) !important; }
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["goodwe","goodwe_et"]
                row:
                  entity: sensor.battery_hours_remaining
                  card_mod:
                    style:
                      hui-generic-entity-row:
                        $: |
                          :host {
                            {% set state = states('sensor.battery_hours_remaining') or '' %}
                            {% set charging = states('sensor.inverter_battery_charging_power') | float(0) %}
                            {% set discharging = states('sensor.inverter_battery_discharging_power') | float(0) %}
                            --runtime-color:
                              {% if state == 'Idle' or state == 'idle' %}
                                blue
                              {% else %}
                                {% set hours = state | regex_findall_index('(\d+)h', 0, '0') | int(0) %}
                                {% set mins  = state | regex_findall_index('(\d+)m', 0, '0') | int(0) %}
                                {% set total_mins = (hours * 60) + mins %}
                                {% if charging > 10 %}
                                  {% if total_mins <= 120 %}
                                    green
                                  {% elif total_mins <= 360 %}
                                    orange
                                  {% else %}
                                    red
                                  {% endif %}
                                {% elif discharging > 10 %}
                                  {% if total_mins > 360 %}
                                    green
                                  {% elif total_mins > 240 %}
                                    orange
                                  {% else %}
                                    red
                                  {% endif %}
                                {% else %}
                                  #615EDB
                                {% endif %}
                              {% endif %};
                          }
                          :host .state {
                            color: var(--runtime-color) !important;
                          }
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["goodwe","goodwe_et"]
                  - entity: binary_sensor.has_battery_completion_time
                    state: "on"
                row:
                  entity: sensor.battery_completion_time
                  card_mod:
                    style:
                      hui-generic-entity-row:
                        $: |
                          :host {
                            {% set state = states('sensor.battery_hours_remaining') or '' %}
                            {% set charging = states('sensor.inverter_battery_charging_power') | float(0) %}
                            {% set discharging = states('sensor.inverter_battery_discharging_power') | float(0) %}
                            --completion-color:
                              {% if state == 'Idle' or state == 'idle' %}
                                blue
                              {% else %}
                                {% set hours = state | regex_findall_index('(\d+)h', 0, '0') | int(0) %}
                                {% set mins  = state | regex_findall_index('(\d+)m', 0, '0') | int(0) %}
                                {% set total_mins = (hours * 60) + mins %}
                                {% if charging > 10 %}
                                  {# Charging: shorter time = better (green) #}
                                  {% if total_mins <= 120 %}
                                    green
                                  {% elif total_mins <= 360 %}
                                    orange
                                  {% else %}
                                    red
                                  {% endif %}
                                {% elif discharging > 10 %}
                                  {# Discharging: longer time = better (green) #}
                                  {% if total_mins > 360 %}
                                    green
                                  {% elif total_mins > 360 %}
                                    orange
                                  {% else %}
                                    red
                                  {% endif %}
                                {% else %}
                                  blue
                                {% endif %}
                              {% endif %};
                          }
                          :host .state {
                            color: var(--completion-color) !important;
                          }
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["goodwe","goodwe_et"]
                  - entity: binary_sensor.has_battery_completion_time
                    state: "off"
                row:
                  entity: sensor.battery_state
                  card_mod:
                    style:
                      hui-generic-entity-row:
                        $: |
                          :host {
                            {% set state = states('sensor.battery_hours_remaining') or '' %}
                            {% set charging = states('sensor.inverter_battery_charging_power') | float(0) %}
                            {% set discharging = states('sensor.inverter_battery_discharging_power') | float(0) %}
                            --completion-color:
                              {% if state == 'Idle' or state == 'idle' %}
                                blue
                              {% else %}
                                {% set hours = state | regex_findall_index('(\d+)h', 0, '0') | int(0) %}
                                {% set mins  = state | regex_findall_index('(\d+)m', 0, '0') | int(0) %}
                                {% set total_mins = (hours * 60) + mins %}
                                {% if charging > 10 %}
                                  {# Charging: shorter time = better (green) #}
                                  {% if total_mins <= 120 %}
                                    green
                                  {% elif total_mins <= 360 %}
                                    orange
                                  {% else %}
                                    red
                                  {% endif %}
                                {% elif discharging > 10 %}
                                  {# Discharging: longer time = better (green) #}
                                  {% if total_mins > 240 %}
                                    green
                                  {% elif total_mins > 360 %}
                                    orange
                                  {% else %}
                                    red
                                  {% endif %}
                                {% else %}
                                  blue
                                {% endif %}
                              {% endif %};
                          }
                          :host .state {
                            color: var(--completion-color) !important;
                          }
              - entity: binary_sensor.exporting_power
                name: Exporting Power
                card_mod:
                  style:
                    hui-generic-entity-row:
                      $: |
                        :host {
                          {% set val = states('binary_sensor.exporting_power') %}
                          --exporting-color:
                            {% if val == 'on' %}
                              orange
                            {% else %}
                              grey
                            {% endif %};
                        }
                        :host .state {color: var(--exporting-color) !important; }
              - entity: binary_sensor.importing_power
                name: Importing Power
                card_mod:
                  style:
                    hui-generic-entity-row:
                      $: |
                        :host {
                          {% set val = states('binary_sensor.importing_power') %}
                          --importing-color:
                            {% if val == 'on' %}
                              orange
                            {% else %}
                              grey
                            {% endif %};
                        }
                        :host .state {color: var(--importing-color) !important; }
              - entity: sensor.inverter_internal_temperature
                name: Inverter Temperature
                card_mod:
                  style:
                    hui-generic-entity-row:
                      $: |
                        :host {
                          {% set val = states('sensor.inverter_internal_temperature') | float(0) %}
                          --temp-color:
                            {% if val <= 50 %}
                              green
                            {% elif val <= 60 %}
                              orange
                            {% else %}
                              red
                            {% endif %};
                        }
                        :host .state {color: var(--temp-color) !important; }
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["fronius"]
                row:
                  entity: sensor.inverter_battery_temperature
                  name: Battery Temperature
                  card_mod:
                    style:
                      hui-generic-entity-row:
                        $: |
                          :host {
                            {% set val = states('sensor.inverter_battery_temperature') | float(0) %}
                            --temp-color:
                              {% if val <= 40 %}
                                green
                              {% elif val <= 55 %}
                                orange
                              {% else %}
                                red
                              {% endif %};
                          }
                          :host .state {color: var(--temp-color) !important; }  
            state_color: true

          - show_name: true
            show_icon: true
            type: button
            tap_action:
              action: toggle
            entity: switch.energy_control_on_off
            name: Energy Control
            show_state: true
            icon: mdi:home-battery
            grid_options:
              columns: 4
              rows: 3
          - type: conditional
            grid_options:
              columns: 4
              rows: 3
            conditions:
              - entity: input_select.electricity_provider
                state_not: "Flow Power"
            card:
              show_name: true
              show_icon: true
              type: button
              entity: input_boolean.high_sell_price_toggle
              name: High Sell Price Mode
              show_state: true
              icon: mdi:currency-usd
          - type: conditional
            grid_options:
              columns: 4
              rows: 3
            conditions:
              - entity: input_select.electricity_provider
                state_not: "Flow Power"
            card:
              show_name: true
              show_icon: true
              type: button
              entity: input_boolean.sellbuy_mode_enabled
              name: Sell/Buy Mode
              show_state: true
              icon: mdi:autorenew
          - type: conditional
            grid_options:
              columns: 8
              rows: 3
            conditions:
              - entity: input_select.electricity_provider
                state: "Flow Power"
            card:
              type: entities
              show_header_toggle: false
              entities:
                - entity: input_boolean.energy_control_auto_reenable
                  name: Auto re-enable Energy Control
          - type: conditional
            conditions:
              - entity: input_select.electricity_provider
                state_not: "Flow Power"
            card:
              type: entities
              entities:
                - entity: input_boolean.energy_control_auto_reenable
                  name: Auto re-enable Energy Control
          - type: conditional
            conditions:
              - entity: input_boolean.energy_control_auto_reenable
                state: "on"
            card:
              type: entities
              title: Energy Control Disable Timer
              entities:
                - entity: input_text.energy_control_duration
                  name: Disable Duration
                - entity: timer.energy_control
                  name: Energy Control Disable Timer Status
          - type: markdown
            content: |
              {% if is_state('switch.energy_control_on_off', 'on') %}
                <h1 style="color: orange; margin-top: 0;">✅ Energy Manager Decision</h1>
              {% else %}
                <h1 style="color: black; margin-top: 0;">❌ Energy Manager Decision</h1>
                <h2>Energy Control is disabled.</h2>
                <h3>The last update received was:</h3>
              {% endif %}
              {% set file_content = states('sensor.energy_manager_decision') | string %}
              {% if file_content | trim == '' or file_content in ['unknown', 'unavailable', 'Unknown'] %}
                <i>The decision will be displayed once you have successfully queried the Energy Manager API.<p>Connectivity will not occur until your Amber Electric/LocalVolts pricing is received, and your BOM integration is working. You must also have entered your Energy Manager API key. Only after this will Energy Manager attempt to connect through to the Energy Manager API servers.</p></i>
              {% else %}
                {{ file_content }}
                {% set epoch = states('sensor.energy_manager_decision_timestamp') | int(0) %}
                **Last Updated:** {{ epoch | timestamp_custom('%d %b %Y at %I:%M %p', true) }}
              {% endif %}
      - type: grid
        cards:
          - type: entities
            title: EMS Control
            entities:
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["fronius","goodwe","goodwe_et"]
                row:
                  entity: input_select.inverter_ems_mode
                  name: EMS Mode
              - entity: input_select.inverter_charge_discharge_mode
                name: Forced Charge/Discharge
          - type: entities
            title: Battery SOC Settings
            entities:
              - entity: input_number.inverter_min_soc
                name: Minimum SoC
                mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: "fronius"
                row:
                  entity: input_number.inverter_max_soc
                  name: Maximum SoC
                  mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["alphaess", "fronius"]
                row:
                  entity: input_number.inverter_reserved_soc_backup
                  name: Reserved SoC for Backup
                  mode: box
          - type: entities
            title: Power Settings
            entities:
              - entity: input_number.inverter_charge_discharge_power
                name: Forced Charge/Discharge Power
                mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["alphaess", "fronius"]
                row:
                  entity: input_number.inverter_max_charge_power
                  name: Max Battery Charge Power
                  mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["alphaess", "fronius"]
                row:
                  entity: input_number.inverter_max_discharge_power
                  name: Max Battery Discharge Power
                  mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "fronius"
                row:
                  entity: input_number.inverter_max_charge_power
                  name: Max Battery Charge/Discharge Power
                  mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "alphaess"
                row:
                  entity: input_number.inverter_max_charge_power
                  name: Max Battery Charge/Discharge Power
                  mode: box
              - entity: input_number.safety_max_charge_power
                name: Safety - Max Charge
                mode: box
              - entity: input_number.safety_max_discharge_power
                name: Safety - Max Discharge
                mode: box
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "sigenergy"
                row:  
                  entity: input_number.inverter_pv_power_limit
                  name: PV Power Limit
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["sigenergy","alphaess"]
                row:
                  entity: input_boolean.inverter_export_power_limit_enabled_input
                  name: Export Power Limit Enabled
              - entity: input_number.inverter_export_power_limit_input
                name: Export Power Limit
                mode: box
          - type: custom:apexcharts-card
            header:
              show: true
              title: Current Power Usage Profile by Hour (W)
            graph_span: 24h
            span:
              start: day
            now:
              show: true
              label: Now
            series:
              - entity: sensor.power_estimate_profile
                name: Predicted Power (W)
                type: column
                data_generator: >
                  let data = []; const attributes =
                  entity.attributes.attributes; const today = new Date(); if
                  (attributes) {
                    for (let i = 0; i < 24; i++) {
                      let hourKey = 'hour_' + String(i).padStart(2, '0');
                      let value = attributes[hourKey];
                      if (value !== null && value !== undefined) {
                        let timestamp = new Date(today.getFullYear(), today.getMonth(), today.getDate(), i, 0, 0, 0);
                        data.push([timestamp.getTime(), parseFloat(value)]);
                      }
                    }
                  } return data;
      - type: grid
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.energy_flow_visual
                state: "on"
            card:
              type: custom:energy-flow-card
              title: Energy Flow
          - type: conditional
            conditions:
              - entity: sensor.demand_interval
                state: "True"
            card:
              type: markdown
              content: >
                <div>
                <center>⚡ Demand Period Active ⚡</center>
                </div>
              card_mod:
                style: |
                  ha-card {
                    background-color:rgb(249, 228, 217);
                    color:rgb(247, 115, 0);
                    padding: 10px 16px;
                    border-radius: 10px;
                    font-weight: bold;
                    font-size: 1.2em;
                  }
          - type: conditional
            conditions:
              - entity: input_select.electricity_provider
                state: "Flow Power"
            card:
              type: markdown
              content: >-
                {% set state = states('input_text.price_signal') %}
                {% set region = states('input_text.aemo_region') %}
                {% set msg = {
                  'Extreme': 'It is not a good time to import from the grid.<br>You will most likely severely impact your PEA score.<br>Use your battery instead.',
                  'Very High': 'It is NOT a good time to import from the grid. You will very likely impact your PEA score.<br>Use your battery instead.',
                  'High': 'It is NOT a good time to import from the grid. You are likely to impact your PEA score.<br>Use your battery instead.',
                  'Average': 'You may impact your PEA score if you import from the grid at the moment.',
                  'Low': 'Probably a good time to use energy from the grid. Prices are relatively cheap.',
                  'Very Low': 'This is most likely a great time to use energy from the grid.',
                  'Negative': 'It is a great time to use energy from the grid.',
                  'Unknown': 'Current price is unknown. Proceed with caution.'
                } %}
                {% set icon = {
                  'Extreme': '<img src="/local/icons/chev_down_3_circle_white.svg" width="64">',
                  'Very High': '<img src="/local/icons/chev_down_2_circle_white.svg" width="64">',
                  'High': '<img src="/local/icons/chev_down_1_circle_white.svg" width="64">',
                  'Average': '<img src="/local/icons/line_circle_white.svg" width="64">',
                  'Low': '<img src="/local/icons/chev_up_1_circle_white.svg" width="64">',
                  'Very Low': '<img src="/local/icons/chev_up_2_circle_white.svg" width="64">',
                  'Negative': '<img src="/local/icons/chev_up_3_circle_white.svg" width="64">',
                  'Unknown': '<img src="/local/icons/question_circle.svg" width="64">'
                } %}
                  # {{ region }} PEA Watch
                  {{ icon.get(state, 'Unknown') }}

                  {{ msg.get(state, 'Unknown') }}
              card_mod:
                style: |
                  ha-card {
                    min-height: 195px;
                    {% set state = states('input_text.price_signal') %}
                    {% set colors = {
                      'Extreme': "#b11122",
                      'Very High': "#b11122",
                      'High': "#b11122",
                      'Average': "#ff5100ff",
                      'Low': "#008000",
                      'Very Low': "#008000",
                      'Negative': "#05ffffff"
                    } %}
                    background-color: {{ colors.get(state, 'grey') }};
                    color: white;
                    text-align: center;
                  }
          - type: entities
            title: Power
            entities:
              - entity: sensor.inverter_pv_power
                name: Current Generation
              - entity: sensor.inverter_load_power
                name: Power Load
              - entity: sensor.inverter_import_power
                name: Import Power
              - entity: sensor.inverter_export_power
                name: Export Power
              - entity: sensor.inverter_battery_charging_power
                name: Battery Charging Power
              - entity: sensor.inverter_battery_discharging_power
                name: Battery Discharging Power
              - entity: sensor.inverter_battery_level
                name: Battery Level (%)
              - entity: sensor.inverter_battery_charge
                name: Battery Charge (kWh)
          - type: entities
            title: Current Status
            show_header_toggle: false
            entities:
              - entity: sensor.inverter_ems_mode_text
                name: Current EMS Mode
                icon: mdi:information
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: "sigenergy"
                row:
                  entity: sensor.inverter_forced_charge_command
                  name: Current Forced Charge/Discharge Mode
                  icon: mdi:information
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["alphaess","fronius","goodwe","goodwe_et"]
                row:
                  type: custom:multiple-entity-row
                  entity: sensor.inverter_current_max_soc
                  name: Current SoC Status
                  state_header: Maximum
                  format: precision0
                  icon: mdi:battery
                  entities:
                    - entity: sensor.inverter_current_min_soc
                      name: Minimum
                      format: precision0
                    - entity: sensor.inverter_current_reserved_soc_backup
                      name: Reserved
                      format: precision0
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "alphaess"
                row:
                  type: custom:multiple-entity-row
                  entity: sensor.inverter_current_max_soc
                  name: Current SoC Status
                  state_header: Maximum
                  format: precision0
                  icon: mdi:battery
                  entities:
                    - entity: sensor.inverter_current_min_soc
                      name: Minimum
                      format: precision0
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "fronius"
                row:
                  type: custom:multiple-entity-row
                  entity: sensor.inverter_current_max_soc
                  name: Current SoC Status
                  state_header: Maximum
                  format: precision0
                  icon: mdi:battery
                  entities:
                    - entity:  sensor.inverter_current_reserved_soc_backup
                      name: Reserved
                      format: precision0
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state_not: ["alphaess","goodwe","goodwe_et", "fronius"]
                row:
                  type: custom:multiple-entity-row
                  entity: sensor.inverter_current_max_discharge_power
                  name: Max Battery Power
                  state_header: Discharge
                  format: precision0
                  icon: mdi:battery
                  entities:
                    - entity:  sensor.inverter_current_max_charge_power
                      name: Charge
                      format: precision0
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: ["goodwe","goodwe_et"]
                row:
                  entity: sensor.inverter_current_max_charge_power
                  name: Current Charge/Discharge Power
                  icon: mdi:information
              - type: conditional
                conditions:
                  - entity: input_select.inverter_brand
                    state: "fronius"
                row:
                  entity: sensor.fronius_current_charge_discharge_power
                  name: Max Battery Charge/Discharge Power
