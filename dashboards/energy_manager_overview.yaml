    title: Dashboard
    icon: mdi:view-dashboard
  - type: custom:tabbed-card
    default_tab: 2
    options:
      '--mdc-theme-primary': '#1976d2'
      '--mdc-tab-text-label-color-default': '#666'
      '--mdc-tab-color-default': '#666'
    tabs:
      - attributes:
          label: 1H
          icon: mdi:clock-outline
        card:
          type: custom:apexcharts-card
          graph_span: 1h
          update_interval: 1min
          header:
            show: true
            title: Inverter Power - Last Hour
            show_states: true
            colorize_states: true
          yaxis:
            - id: power
              decimals: 2
              apex_config:
                title:
                  text: Power (W)
                labels:
                  formatter: |
                    EVAL:function(value) {
                      if (value >= 1000) {
                        return (value / 1000).toFixed(1) + 'kW';
                      }
                      return value.toFixed(0) + 'W';
                    }
            - id: percentage
              opposite: true
              decimals: 1
              max: 100
              min: 0
              apex_config:
                title:
                  text: Battery Level (%)
          series:
            - entity: sensor.inverter_pv_power
              name: PV Power
              type: area
              color: '#FFD700'
              opacity: 0.3
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: power
            - entity: sensor.inverter_load_power
              name: Load Power
              type: area
              color: '#87CEEB'
              opacity: 0.3
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: power
            - entity: sensor.inverter_import_power
              name: Grid Import
              type: area
              color: '#FF6B6B'
              opacity: 0.3
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: power
            - entity: sensor.inverter_export_power
              name: Grid Export
              type: area
              color: '#90EE90'
              opacity: 0.3
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: power
            - entity: sensor.inverter_battery_charging_power
              name: Battery Charging
              type: area
              color: '#FFA500'
              opacity: 0.3
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: power
            - entity: sensor.inverter_battery_discharging_power
              name: Battery Discharging
              type: area
              color: '#DDA0DD'
              opacity: 0.3
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: power
            - entity: sensor.inverter_battery_level
              name: Battery Level
              type: line
              color: '#32CD32'
              stroke_width: 2
              group_by:
                func: avg
                duration: 1min
              yaxis_id: percentage
          apex_config:
            chart:
              height: 400
              animations:
                enabled: true
            stroke:
              curve: smooth
              dashArray:
                - 0
                - 0
                - 0
                - 0
                - 0
                - 0
                - 5
            dataLabels:
              enabled: false
            legend:
              show: true
              position: bottom
            tooltip:
              enabled: true
              shared: true
              x:
                format: HH:mm
              'y':
                formatter: |
                  EVAL:function(value, { seriesIndex }) {
                    if (seriesIndex === 6) {
                      return value.toFixed(1) + '%';
                    }
                    if (value >= 1000) {
                      return (value / 1000).toFixed(2) + ' kW';
                    }
                    return value.toFixed(0) + ' W';
                  }
            grid:
              show: true
              strokeDashArray: 3
            xaxis:
              type: datetime
              labels:
                format: HH:mm
